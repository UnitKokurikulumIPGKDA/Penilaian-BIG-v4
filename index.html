<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIG HUB - Debugging Data Loading</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono&display=swap" rel="stylesheet">

    <style>
        body { background-color: #050505; color: #e2e8f0; font-family: 'Space Grotesk', sans-serif; margin: 0; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(16, 185, 129, 0.2); }
        .error-box { border: 1px solid #ef4444; background: rgba(239, 68, 68, 0.1); color: #fca5a5; padding: 20px; border-radius: 12px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;
        const { motion, AnimatePresence } = window.Motion || { motion: (props) => <div {...props} />, AnimatePresence: (props) => <div {...props} /> };

        const SHEET_ID = "1SQa2PT8noL7fNZQ09wzFLbNNdu5NIBzBAOkYI7U4-ng";
        const CONFIG = {
            CSV_STUDENTS: `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`,
            CSV_LECTURERS: `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=465305263`,
            ADMIN_EMAIL: 'haniff.faizal@ipgm.edu.my'
        };

        const Icon = ({ name, size = 18, className = "" }) => {
            const [svg, setSvg] = useState('');
            useEffect(() => {
                try {
                    if (window.lucide && window.lucide.icons[name]) {
                        setSvg(window.lucide.icons[name].toSvg({ width: size, height: size }));
                    }
                } catch (e) { console.error("Lucide Error", e); }
            }, [name, size]);
            return <span className={`inline-flex items-center justify-center ${className}`} dangerouslySetInnerHTML={{ __html: svg }} />;
        };

        const parseCSV = (text) => {
            if (!text) return [];
            const rows = text.split(/\r?\n/).filter(r => r.trim());
            if (rows.length < 2) return [];
            const headers = rows[0].split(',').map(h => h.trim().replace(/"/g, '').toLowerCase());
            
            return rows.slice(1).map(row => {
                const values = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.trim().replace(/"/g, ''));
                let obj = {};
                headers.forEach((h, i) => {
                    const val = values[i] || '';
                    if (h.includes('nama')) obj.nama = val;
                    if (h.includes('kp')) obj.no_kp = val;
                    if (h.includes('unit') || h.includes('kelas')) obj.kelas = val;
                    if (h.includes('gambar')) obj.url_gambar = val;
                    if (h.includes('email')) obj.email = val.toLowerCase();
                    if (h.includes('password')) obj.password = val;
                });
                return obj;
            });
        };

        function App() {
            const [state, setState] = useState({ loading: true, error: null, data: { students: [], lecturers: [] } });
            const [view, setView] = useState('login');
            const [role, setRole] = useState('staff');
            const [user, setUser] = useState(null);

            const loadData = useCallback(async () => {
                try {
                    const resS = await fetch(CONFIG.CSV_STUDENTS).then(r => r.ok ? r.text() : Promise.reject("Gagal akses CSV Pelajar"));
                    const resL = await fetch(CONFIG.CSV_LECTURERS).then(r => r.ok ? r.text() : Promise.reject("Gagal akses CSV Pensyarah"));
                    
                    const sData = parseCSV(resS);
                    const lData = parseCSV(resL);

                    if (sData.length === 0) throw new Error("Data pelajar kosong atau format salah.");

                    setState({ loading: false, error: null, data: { students: sData, lecturers: lData } });
                } catch (e) {
                    setState({ loading: false, error: e.message, data: { students: [], lecturers: [] } });
                }
            }, []);

            useEffect(() => { loadData(); }, [loadData]);

            const handleLogin = (e) => {
                e.preventDefault();
                const email = e.target.email?.value.trim().toLowerCase();
                const pass = e.target.password?.value;
                const ic = e.target.ic?.value;

                if (role === 'student') {
                    const found = state.data.students.find(s => s.no_kp === ic);
                    if (found) { setUser(found); setView('dashboard'); }
                    else alert("ID tidak dijumpai.");
                } else {
                    if (email === CONFIG.ADMIN_EMAIL && pass === '30621') {
                        setUser({ nama: 'Admin Haniff', role: 'admin' });
                        setView('dashboard');
                    } else {
                        const lect = state.data.lecturers.find(l => l.email === email && l.password === pass);
                        if (lect) { setUser(lect); setView('dashboard'); }
                        else alert("Email atau Kata Laluan salah.");
                    }
                }
            };

            if (state.loading) return (
                <div className="h-screen flex flex-col items-center justify-center gap-4 bg-black">
                    <div className="w-10 h-10 border-4 border-emerald-500/20 border-t-emerald-500 rounded-full animate-spin"></div>
                    <p className="mono text-[10px] text-emerald-500 uppercase tracking-widest">Memuatkan Sistem...</p>
                </div>
            );

            if (state.error) return (
                <div className="h-screen p-10 flex items-center justify-center">
                    <div className="error-box max-w-md w-full">
                        <h2 className="font-bold mb-2">Sistem Tergendala (Error)</h2>
                        <p className="text-sm opacity-80 mb-4">{state.error}</p>
                        <ul className="text-xs list-disc pl-5 space-y-1">
                            <li>Pastikan Google Sheet dikongsi kepada "Anyone with the link".</li>
                            <li>Pastikan ID Sheet dan GID (Gid=0, dll) adalah betul.</li>
                        </ul>
                        <button onClick={() => window.location.reload()} className="mt-6 w-full py-2 bg-red-500 text-white rounded-lg font-bold">Cuba Lagi</button>
                    </div>
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen border-x border-white/5 bg-black">
                    {view === 'login' ? (
                        <div className="p-8 pt-24">
                            <div className="glass p-8 rounded-[32px] text-center shadow-2xl">
                                <h1 className="text-3xl font-bold tracking-tighter mb-8 italic">BIG HUB <span className="text-emerald-500">2026</span></h1>
                                <div className="flex bg-white/5 p-1 rounded-xl mb-6">
                                    <button onClick={() => setRole('staff')} className={`flex-1 py-2 text-[10px] font-bold rounded-lg ${role === 'staff' ? 'bg-emerald-500 text-black' : 'text-slate-500'}`}>STAFF</button>
                                    <button onClick={() => setRole('student')} className={`flex-1 py-2 text-[10px] font-bold rounded-lg ${role === 'student' ? 'bg-emerald-500 text-black' : 'text-slate-500'}`}>PELAJAR</button>
                                </div>
                                <form onSubmit={handleLogin} className="space-y-4">
                                    {role === 'staff' ? (
                                        <>
                                            <input name="email" placeholder="Email" className="w-full bg-black border border-white/10 p-4 rounded-xl outline-none focus:border-emerald-500" required />
                                            <input name="password" type="password" placeholder="Password" className="w-full bg-black border border-white/10 p-4 rounded-xl outline-none focus:border-emerald-500" required />
                                        </>
                                    ) : (
                                        <input name="ic" placeholder="No. KP (Tanpa -)" className="w-full bg-black border border-white/10 p-4 rounded-xl text-center font-bold outline-none focus:border-emerald-500" required />
                                    )}
                                    <button className="w-full py-4 bg-emerald-500 text-black font-bold rounded-xl uppercase tracking-widest text-xs">Mula Sesi</button>
                                </form>
                            </div>
                        </div>
                    ) : (
                        <div className="p-4">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="font-bold text-emerald-500 uppercase tracking-widest text-xs">Terminal Aktif</h2>
                                <button onClick={() => setView('login')} className="text-red-500 text-xs font-bold">LOG KELUAR</button>
                            </div>
                            <div className="glass p-6 rounded-2xl mb-4">
                                <p className="text-[10px] text-slate-500 uppercase font-bold mb-1">Pengguna Terlog-masuk</p>
                                <p className="text-lg font-bold">{user.nama}</p>
                            </div>
                            <div className="space-y-3">
                                <p className="text-[10px] text-slate-500 uppercase font-bold px-1">Senarai Pelajar ({state.data.students.length})</p>
                                {state.data.students.map((s, i) => (
                                    <div key={i} className="glass p-4 rounded-xl flex justify-between items-center">
                                        <div className="truncate pr-4">
                                            <p className="text-xs font-bold uppercase truncate">{s.nama}</p>
                                            <p className="mono text-[8px] text-slate-500">{s.kelas || 'Tiada Unit'}</p>
                                        </div>
                                        <Icon name="chevron-right" size={14} className="text-emerald-500" />
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
