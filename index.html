<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIG HUB - Sistem Pemarkahan</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono&display=swap" rel="stylesheet">

    <style>
        body { background-color: #050505; color: #e2e8f0; font-family: 'Space Grotesk', sans-serif; margin: 0; overflow-x: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(16, 185, 129, 0.1); }
        .input-range { -webkit-appearance: none; width: 100%; height: 8px; background: #1a1a1a; border-radius: 5px; outline: none; }
        .input-range::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; background: #10b981; border-radius: 50%; cursor: pointer; border: 3px solid #000; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo } = React;
        const { motion, AnimatePresence } = window.Motion;

        const SHEET_ID = "1SQa2PT8noL7fNZQ09wzFLbNNdu5NIBzBAOkYI7U4-ng";
        const CONFIG = {
            CSV_STUDENTS: `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`,
            CSV_LECTURERS: `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=465305263`,
            API_URL: "https://script.google.com/macros/s/AKfycbyCTEXTf1BT7tY_Z6SsuN8knvUmZJSpoRluSffTpUhJygURjmcibkZYgHdlC6LSt3wljw/exec"
        };

        const Icon = ({ name, size = 18, className = "" }) => {
            const [svg, setSvg] = useState('');
            useEffect(() => {
                if (window.lucide && window.lucide.icons[name]) {
                    setSvg(window.lucide.icons[name].toSvg({ width: size, height: size }));
                }
            }, [name, size]);
            return <span className={`inline-flex items-center justify-center ${className}`} dangerouslySetInnerHTML={{ __html: svg }} />;
        };

        const parseCSV = (text) => {
            const rows = text.split(/\r?\n/).filter(r => r.trim());
            if (rows.length < 2) return [];
            const headers = rows[0].split(',').map(h => h.trim().replace(/"/g, '').toLowerCase());
            return rows.slice(1).map(row => {
                const values = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.trim().replace(/"/g, ''));
                let obj = {};
                headers.forEach((h, i) => {
                    const val = values[i] || '';
                    if (h.includes('nama')) obj.nama = val;
                    if (h.includes('kp')) obj.no_kp = val;
                    if (h.includes('unit') || h.includes('kelas')) obj.kelas = val;
                    if (h.includes('gambar')) obj.url_gambar = val;
                    if (h.includes('email')) obj.email = val.toLowerCase();
                    if (h.includes('password')) obj.password = val;
                });
                return obj;
            });
        };

        function App() {
            const [data, setData] = useState({ students: [], lecturers: [] });
            const [loading, setLoading] = useState(true);
            const [view, setView] = useState('login');
            const [user, setUser] = useState(null);
            const [selectedStudent, setSelectedStudent] = useState(null);
            const [search, setSearch] = useState('');
            const [syncing, setSyncing] = useState(false);

            // Marks State (Temporary for UI)
            const [marks, setMarks] = useState({ hp8_ind: 10, hp8_kum: 20, amali: 75 });

            useEffect(() => {
                fetch(CONFIG.CSV_STUDENTS).then(r => r.text()).then(txt => {
                    const s = parseCSV(txt);
                    setData(prev => ({ ...prev, students: s }));
                    setLoading(false);
                });
            }, []);

            const filteredStudents = useMemo(() => {
                return data.students.filter(s => s.nama.toLowerCase().includes(search.toLowerCase()));
            }, [data.students, search]);

            const handleSave = async () => {
                setSyncing(true);
                // Simulasi hantar data ke Apps Script
                setTimeout(() => {
                    alert("Markah Berjaya Disimpan ke Cloud!");
                    setSyncing(false);
                    setSelectedStudent(null);
                }, 1500);
            };

            if (loading) return <div className="h-screen flex items-center justify-center bg-black text-emerald-500 mono text-xs animate-pulse">CONNECTING TO DATABASE...</div>;

            return (
                <div className="max-w-md mx-auto min-h-screen border-x border-white/5 bg-[#050505] relative shadow-2xl">
                    {view === 'login' ? (
                        <div className="p-8 pt-32 text-center">
                            <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} className="glass p-8 rounded-[40px]">
                                <h1 className="text-3xl font-bold tracking-tighter mb-2 italic">BIG HUB <span className="text-emerald-500">2026</span></h1>
                                <p className="text-[10px] text-slate-500 uppercase tracking-widest mb-8">Lecturer Access Only</p>
                                <button onClick={() => { setUser({nama: 'Penyelaras'}); setView('dashboard'); }} className="w-full py-4 bg-emerald-500 text-black font-bold rounded-2xl uppercase text-xs tracking-widest">Akses Terminal</button>
                            </motion.div>
                        </div>
                    ) : (
                        <div className="flex flex-col h-screen">
                            {/* Top Bar */}
                            <div className="p-4 bg-black/50 backdrop-blur-md border-b border-white/5 flex justify-between items-center sticky top-0 z-50">
                                <div>
                                    <h2 className="text-[10px] font-bold text-emerald-500 uppercase tracking-widest">Active Terminal</h2>
                                    <p className="text-xs font-bold">{user?.nama}</p>
                                </div>
                                <button onClick={() => setView('login')} className="p-2 text-red-500/50 hover:text-red-500"><Icon name="log-out" size={18} /></button>
                            </div>

                            {/* Search */}
                            <div className="p-4">
                                <div className="relative">
                                    <Icon name="search" size={14} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500" />
                                    <input 
                                        value={search}
                                        onChange={(e) => setSearch(e.target.value)}
                                        placeholder="Cari nama pelajar..." 
                                        className="w-full bg-white/5 border border-white/10 rounded-2xl py-3 pl-11 pr-4 text-sm outline-none focus:border-emerald-500 transition-all"
                                    />
                                </div>
                            </div>

                            {/* List Students */}
                            <div className="flex-1 overflow-y-auto p-4 space-y-3 no-scrollbar pb-10">
                                {filteredStudents.map((s, i) => (
                                    <motion.div 
                                        key={i} 
                                        whileTap={{ scale: 0.98 }}
                                        onClick={() => setSelectedStudent(s)}
                                        className="glass p-4 rounded-2xl flex items-center gap-4 cursor-pointer hover:border-emerald-500/50 transition-all"
                                    >
                                        <div className="w-10 h-10 bg-emerald-500/10 rounded-xl flex items-center justify-center text-emerald-500 font-bold">
                                            {s.nama.charAt(0)}
                                        </div>
                                        <div className="flex-1 overflow-hidden">
                                            <h4 className="text-[11px] font-bold uppercase truncate">{s.nama}</h4>
                                            <p className="text-[8px] mono text-slate-500 uppercase">{s.kelas || 'Tiada Unit'}</p>
                                        </div>
                                        <Icon name="chevron-right" size={14} className="text-slate-700" />
                                    </motion.div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* Evaluation Modal */}
                    <AnimatePresence>
                        {selectedStudent && (
                            <motion.div 
                                initial={{ y: '100%' }} animate={{ y: 0 }} exit={{ y: '100%' }}
                                transition={{ type: 'spring', damping: 25, stiffness: 200 }}
                                className="fixed inset-0 z-[100] bg-black flex flex-col"
                            >
                                <div className="p-4 flex items-center gap-4 border-b border-white/10">
                                    <button onClick={() => setSelectedStudent(null)} className="p-2 bg-white/5 rounded-xl"><Icon name="chevron-left" /></button>
                                    <div className="flex-1">
                                        <h3 className="text-xs font-bold uppercase truncate">{selectedStudent.nama}</h3>
                                        <p className="text-[8px] text-emerald-500 mono uppercase tracking-widest">Borang Penilaian Praktikal</p>
                                    </div>
                                </div>

                                <div className="flex-1 overflow-y-auto p-6 space-y-8 no-scrollbar">
                                    {/* Score Cards */}
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="glass p-4 rounded-3xl text-center">
                                            <p className="text-[8px] text-slate-500 uppercase mb-2">HP8 INDIVIDU (15)</p>
                                            <p className="text-2xl font-bold text-emerald-500 mono">{marks.hp8_ind}</p>
                                        </div>
                                        <div className="glass p-4 rounded-3xl text-center">
                                            <p className="text-[8px] text-slate-500 uppercase mb-2">HP8 KUMP (30)</p>
                                            <p className="text-2xl font-bold text-blue-500 mono">{marks.hp8_kum}</p>
                                        </div>
                                    </div>

                                    {/* Sliders */}
                                    <div className="space-y-6">
                                        <div className="space-y-3">
                                            <div className="flex justify-between text-[10px] font-bold uppercase">
                                                <span>Kompetensi Amali</span>
                                                <span className="text-emerald-500">{marks.amali}%</span>
                                            </div>
                                            <input 
                                                type="range" min="0" max="100" value={marks.amali}
                                                onChange={(e) => setMarks({...marks, amali: e.target.value})}
                                                className="input-range" 
                                            />
                                        </div>

                                        <div className="space-y-3">
                                            <div className="flex justify-between text-[10px] font-bold uppercase">
                                                <span>Merit Individu</span>
                                                <span className="text-emerald-500">{marks.hp8_ind}</span>
                                            </div>
                                            <input 
                                                type="range" min="0" max="15" value={marks.hp8_ind}
                                                onChange={(e) => setMarks({...marks, hp8_ind: e.target.value})}
                                                className="input-range" 
                                            />
                                        </div>
                                    </div>

                                    <div className="glass p-6 rounded-3xl">
                                        <p className="text-[9px] text-slate-500 uppercase mb-3 font-bold">Catatan Pemerhati</p>
                                        <textarea className="w-full bg-transparent border border-white/5 rounded-xl p-3 text-sm outline-none focus:border-emerald-500/30 h-24" placeholder="Tulis ulasan ringkas..."></textarea>
                                    </div>
                                </div>

                                <div className="p-6 bg-black border-t border-white/10">
                                    <button 
                                        disabled={syncing}
                                        onClick={handleSave}
                                        className="w-full py-4 bg-emerald-500 text-black font-bold rounded-2xl uppercase text-xs tracking-widest shadow-[0_0_30px_rgba(16,185,129,0.2)] flex items-center justify-center gap-3"
                                    >
                                        {syncing ? <div className="w-4 h-4 border-2 border-black border-t-transparent rounded-full animate-spin"></div> : <Icon name="save" size={16} />}
                                        Simpan Pemarkahan Cloud
                                    </button>
                                </div>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
