<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIG HUB - Penilaian Bersepadu 2026</title>
    
    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #020617;
            color: #f8fafc;
            margin: 0;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .giant-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 10px;
            background: #1e293b;
            border-radius: 10px;
            outline: none;
            margin: 10px 0;
            border: 1px solid #334155;
        }

        .giant-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 32px;
            height: 32px;
            background: #10b981;
            border-radius: 50%;
            cursor: pointer;
            border: 4px solid #0f172a;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }

        .glass-morphism {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(16, 185, 129, 0.15);
        }

        .tab-active {
            background: #10b981 !important;
            color: #020617 !important;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
            font-weight: 800;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }

        .filter-select {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 6px 12px;
            color: #10b981;
            font-size: 0.7rem;
            font-weight: 700;
            outline: none;
            width: 100%;
            appearance: none;
        }

        .form-input {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 8px 12px;
            width: 100%;
            color: white;
            font-size: 0.8rem;
            outline: none;
        }

        .scan-pulse {
            animation: scan-pulse 2s infinite;
        }
        @keyframes scan-pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 12px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .icon-container {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 1em;
            height: 1em;
        }

        #reader {
            width: 100%;
            border: none !important;
            border-radius: 20px;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        // --- KONFIGURASI URL ---
        const CSV_STUDENTS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTK1rQeMq2o_-KpvnhW8aitybwhR0cud8bxLgc7rs46GFba0lFnzsepdSHBR4qTYyP0eapgbbHXtsOG/pub?output=csv";
        const CSV_LECTURERS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTK1rQeMq2o_-KpvnhW8aitybwhR0cud8bxLgc7rs46GFba0lFnzsepdSHBR4qTYyP0eapgbbHXtsOG/pub?gid=465305263&single=true&output=csv";
        const CSV_MARKS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTK1rQeMq2o_-KpvnhW8aitybwhR0cud8bxLgc7rs46GFba0lFnzsepdSHBR4qTYyP0eapgbbHXtsOG/pub?gid=1325589771&single=true&output=csv";
        const GOOGLE_SHEET_API_URL = "https://script.google.com/macros/s/AKfycbyCTEXTf1BT7tY_Z6SsuN8knvUmZJSpoRluSffTpUhJygURjmcibkZYgHdlC6LSt3wljw/exec"; 

        const ADMIN_EMAIL = 'haniff.faizal@ipgm.edu.my';
        const KUMPULAN_LIST = ["GREY", "UNGU", "PINK", "KUNING", "BIRU", "HIJAU", "BIRU GELAP", "COKLAT", "JINGGA", "MERAH"];
        const NO_AHLI_LIST = Array.from({ length: 20 }, (_, i) => (i + 1).toString());

        const COLOR_MAP = {
            "PINK": "P", "UNGU": "U", "GREY": "G", "KUNING": "K", 
            "BIRU": "B", "HIJAU": "H", "BIRU GELAP": "BG", 
            "COKLAT": "C", "JINGGA": "J", "MERAH": "M"
        };

        // --- PARSER CSV ---
        const parseCSV = (text) => {
            const rows = text.split(/\r?\n/).filter(r => r.trim());
            if (rows.length < 2) return [];
            const headers = rows[0].split(',').map(h => h.trim().replace(/"/g, ''));
            
            return rows.slice(1).map(row => {
                const values = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.trim().replace(/"/g, ''));
                let obj = {};
                headers.forEach((h, i) => {
                    const val = values[i] || '';
                    if (h === 'Nama_Pelajar') obj.nama = val;
                    else if (h === 'No_KP') obj.no_kp = val.toString().trim();
                    else if (h === 'Kelas') obj.kelas = val;
                    else if (h === 'Url Gambar') obj.url_gambar = val;
                    else if (h === 'SIRI BIG') obj.siri = val;
                    else if (h === 'KUMPULAN BIG') obj.kumpulan = val;
                    else if (h === 'No Dalam Kumpulan') obj.no_kumpulan = val;
                    else if (h === 'NAMA_PENSYARAH') obj.assigned_lecturer = val;
                    
                    // Markah
                    if (h === 'Kuiz1') obj.val_kuiz1 = val;
                    if (h === 'Kuiz2') obj.val_kuiz2 = val;
                    if (h === 'HP4 (10%)') obj.val_hp4 = val;
                    if (h === 'HP5 (10%)') obj.val_hp5 = val;
                    if (h === 'HP8 Ind (15%)') obj.val_hp8_ind = val;
                    if (h === 'HP8 Kum (30%)') obj.val_hp8_kum = val;
                    if (h === 'HP3 (25%)') obj.val_hp3 = val;
                    if (h === 'JUMLAH (100%)') obj.val_total = val;

                    // Data login pensyarah
                    if (h === 'EMAIL') obj.email = val.toLowerCase();
                    if (h === 'PASSWORD') obj.password = val;
                });
                return obj;
            });
        };

        const Icon = ({ name, size = 16, className = "" }) => {
            const [svg, setSvg] = useState('');
            useEffect(() => {
                if (window.lucide) {
                    const icon = window.lucide.icons[name];
                    if (icon) {
                        const svgString = icon.toSvg({ width: size, height: size });
                        setSvg(svgString);
                    }
                }
            }, [name, size]);
            return <span className={`inline-flex items-center justify-center ${className}`} dangerouslySetInnerHTML={{ __html: svg }} />;
        };

        // --- SCANNER MODAL ---
        const ScannerModal = ({ isOpen, onClose, onScan, students }) => {
            useEffect(() => {
                let html5QrCode;
                if (isOpen) {
                    html5QrCode = new Html5Qrcode("reader");
                    html5QrCode.start(
                        { facingMode: "environment" }, 
                        { fps: 15, qrbox: { width: 250, height: 250 } }, 
                        (decodedText) => {
                            const code = decodedText.trim().toUpperCase();
                            // Cari menggunakan No_KP atau Tag ID (cth: C3)
                            let found = students.find(s => s.no_kp === code);
                            if (!found) {
                                found = students.find(s => {
                                    const cInit = COLOR_MAP[s.kumpulan?.toUpperCase()] || s.kumpulan?.charAt(0);
                                    return `${cInit}${s.no_kumpulan}` === code;
                                });
                            }
                            if (found) { onScan(found); html5QrCode.stop().then(onClose).catch(onClose); }
                        },
                        () => {}
                    );
                }
                return () => { if (html5QrCode?.isScanning) html5QrCode.stop().catch(()=>{}); };
            }, [isOpen, students, onScan, onClose]);

            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[100] bg-black/90 flex flex-col items-center justify-center p-6 backdrop-blur-md">
                    <div className="w-full max-w-sm glass-morphism rounded-[40px] p-6 border-emerald-500/30">
                        <div className="flex justify-between items-center mb-6">
                            <h3 className="text-emerald-400 font-black text-sm uppercase tracking-widest italic">PENGIMBAS BIG</h3>
                            <button onClick={onClose} className="p-2 bg-slate-800 rounded-xl text-slate-400"><Icon name="x" size={20}/></button>
                        </div>
                        <div id="reader" className="bg-slate-900 rounded-3xl mb-6"></div>
                        <p className="text-slate-500 text-[10px] text-center uppercase tracking-widest">Arahkan kamera ke Tag atau QR Pelajar</p>
                    </div>
                </div>
            );
        };

        // --- DASHBOARD ADMIN ---

        const AdminDashboard = ({ students, onLogout, onSelectStudent }) => {
            const [search, setSearch] = useState('');
            const filteredStudents = useMemo(() => students.filter(s => s.nama?.toLowerCase().includes(search.toLowerCase())), [students, search]);

            return (
                <div className="h-screen flex flex-col bg-[#020617] overflow-hidden">
                    <div className="p-4 bg-slate-900 border-b border-slate-800 flex items-center justify-between shrink-0 shadow-2xl z-50">
                        <div className="flex items-center gap-3">
                            <div className="w-8 h-8 bg-emerald-500 rounded-lg flex items-center justify-center font-black italic text-slate-950 text-xs shadow-lg">BIG</div>
                            <div>
                                <h1 className="font-black text-[10px] text-white uppercase tracking-widest leading-none">Admin Terminal</h1>
                                <p className="text-[7px] text-emerald-500 font-bold uppercase">En. Haniff Faizal</p>
                            </div>
                        </div>
                        <button onClick={onLogout} className="p-2 bg-slate-800 rounded-lg text-red-400 active:scale-90"><Icon name="log-out" size={16}/></button>
                    </div>

                    <div className="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-950 no-scrollbar">
                        <div className="grid grid-cols-2 gap-2">
                            <div className="glass-morphism p-3 rounded-2xl text-center border-emerald-500/10 shadow-lg"><p className="text-[6px] font-black text-slate-500 uppercase mb-1">Purata Kohort</p><p className="text-xl font-black text-emerald-400">{((students.reduce((a,b)=>a+(parseFloat(b.val_total)||0),0)/students.length)||0).toFixed(1)}%</p></div>
                            <div className="glass-morphism p-3 rounded-2xl text-center border-slate-800 shadow-lg"><p className="text-[6px] font-black text-slate-500 uppercase mb-1">Total Calon</p><p className="text-xl font-black text-white">{students.length}</p></div>
                        </div>

                        <div className="space-y-2 pb-24">
                            <div className="flex items-center justify-between px-1">
                                <h3 className="text-[9px] font-black text-slate-500 uppercase tracking-widest">Data Pelajar Global</h3>
                                <div className="relative w-36">
                                    <Icon name="search" className="absolute left-2.5 top-1/2 -translate-y-1/2 text-slate-600" size={10} />
                                    <input value={search} onChange={e => setSearch(e.target.value)} className="bg-slate-900 border border-slate-800 rounded-lg py-1.5 pl-7 pr-2 text-[8px] text-white w-full outline-none focus:border-emerald-500 shadow-inner" placeholder="Cari..." />
                                </div>
                            </div>
                            <div className="space-y-1.5">
                                {filteredStudents.length > 0 ? filteredStudents.map((s, idx) => (
                                    <div key={idx} onClick={() => onSelectStudent(s)} className="glass-morphism p-3 rounded-2xl flex items-center gap-3 border-slate-800 active:scale-[0.98] cursor-pointer shadow-md text-left">
                                        <div className="w-10 h-10 rounded-lg bg-slate-800 border border-slate-700 overflow-hidden shrink-0 flex items-center justify-center">
                                            {s.url_gambar ? <img src={s.url_gambar} className="w-full h-full object-cover" /> : <Icon name="user" className="text-slate-700" size={18} />}
                                        </div>
                                        <div className="flex-1 overflow-hidden">
                                            <h4 className="text-[10px] font-black text-white uppercase truncate tracking-tight font-bold leading-none">{s.nama || "Tiada Nama"}</h4>
                                            <p className="text-[7px] text-slate-500 uppercase font-bold mt-1">Unit: {s.kelas} | Siri: {s.siri}</p>
                                        </div>
                                        <div className="text-right shrink-0">
                                            <p className="text-[10px] font-black text-emerald-400">{s.val_total}%</p>
                                        </div>
                                    </div>
                                )) : <div className="py-20 text-center text-[10px] text-slate-700 font-bold uppercase italic tracking-widest">Tiada Rekod Pelajar</div>}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const LoginView = ({ role, setRole, handleLogin, students, onQuickScan }) => {
            const [scanCode, setScanCode] = useState('');
            const [isScanning, setIsScanning] = useState(false);
            const handleManualTag = (e) => {
                const code = e.target.value.toUpperCase().trim();
                setScanCode(code);
                if (code.length >= 2) {
                    const found = students.find(s => {
                        const cInit = COLOR_MAP[s.kumpulan?.toUpperCase()] || s.kumpulan?.charAt(0);
                        return `${cInit}${s.no_kumpulan}` === code;
                    }) || students.find(s => s.no_kp === code);
                    if (found) { onQuickScan(found); setScanCode(''); }
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-[#020617] text-center">
                    <ScannerModal isOpen={isScanning} onClose={() => setIsScanning(false)} onScan={onQuickScan} students={students} />
                    <motion.div initial={{ opacity: 0, scale: 0.95 }} animate={{ opacity: 1, scale: 1 }} className="w-full max-w-md glass-morphism p-8 rounded-[40px] border-emerald-500/20 shadow-2xl relative overflow-hidden">
                        <div className="absolute top-0 right-0 p-4 z-20 flex gap-2">
                            <button onClick={() => setIsScanning(true)} className="bg-emerald-500 text-slate-950 p-2.5 rounded-xl shadow-lg active:scale-90 transition-all"><Icon name="camera" size={20}/></button>
                            <input value={scanCode} onChange={handleManualTag} className="w-20 bg-emerald-500/10 border border-emerald-500/30 rounded-lg py-1 px-2 text-center text-[10px] font-black text-emerald-400 outline-none scan-pulse" placeholder="TAG ID" />
                        </div>
                        <div className="mb-10 mt-8">
                            <div className="inline-flex p-3 bg-emerald-500/10 rounded-2xl mb-4 border border-emerald-500/20 shadow-lg"><Icon name="shield-check" className="text-emerald-500" size={44} /></div>
                            <h2 className="text-3xl font-black text-white italic uppercase tracking-tighter">BIG Hub.</h2>
                            <p className="text-slate-500 text-[9px] font-black uppercase tracking-[0.4em] mt-3 border-t border-slate-800 pt-3 mx-10">Integrated Terminal</p>
                        </div>
                        <form onSubmit={handleLogin} className="space-y-4 text-left">
                            <div className="flex p-1 bg-slate-800/40 rounded-xl border border-slate-700/50">
                                <button type="button" onClick={() => setRole('staff')} className={`flex-1 py-3 text-[10px] font-black rounded-lg transition-all ${role !== 'student' ? 'bg-emerald-500 text-slate-950 shadow-lg' : 'text-slate-500'}`}>PENSYARAH</button>
                                <button type="button" onClick={() => setRole('student')} className={`flex-1 py-3 text-[10px] font-black rounded-lg transition-all ${role === 'student' ? 'bg-emerald-500 text-slate-950 shadow-lg' : 'text-slate-500'}`}>PELAJAR</button>
                            </div>
                            {role === 'student' ? (
                                <input name="ic" type="text" placeholder="No. Kad Pengenalan" className="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 text-white outline-none focus:border-emerald-500 text-center font-bold tracking-widest text-sm shadow-inner" required />
                            ) : (
                                <div className="space-y-3">
                                    <input name="email" type="email" placeholder="Emel IPGM" className="w-full bg-slate-900 border border-slate-700 rounded-xl p-3.5 text-white outline-none focus:border-emerald-500 text-xs shadow-inner" required />
                                    <input name="password" type="password" placeholder="Kata Laluan" className="w-full bg-slate-900 border border-slate-700 rounded-xl p-3.5 text-white outline-none focus:border-emerald-500 text-xs shadow-inner" required />
                                </div>
                            )}
                            <button type="submit" className="w-full py-4 rounded-2xl bg-emerald-500 text-slate-950 font-black shadow-lg active:scale-95 transition-all uppercase tracking-widest text-[11px]">Buka Protokol</button>
                        </form>
                    </motion.div>
                </div>
            );
        };

        const LecturerDashboard = ({ currentUser, students, searchQuery, setSearchQuery, setSelectedStudent, setActiveEvalTab, onLogout, isAdmin }) => {
            const filtered = useMemo(() => {
                let list = students;
                if (!isAdmin) list = list.filter(s => s.assigned_lecturer?.trim().toLowerCase() === currentUser?.nama_pensyarah?.trim().toLowerCase());
                return list.filter(s => s.nama?.toLowerCase().includes(searchQuery.toLowerCase()));
            }, [students, currentUser, searchQuery, isAdmin]);

            return (
                <div className="h-screen flex flex-col overflow-hidden bg-slate-950">
                    <div className="p-4 bg-slate-900 border-b border-slate-800 flex items-center justify-between shrink-0 shadow-2xl z-50">
                        <div className="flex items-center gap-3 text-left">
                            <div className="w-8 h-8 bg-emerald-500 rounded-lg flex items-center justify-center font-black italic text-slate-950 text-[10px]">BIG</div>
                            <div><h1 className="font-black text-[9px] text-white uppercase tracking-widest leading-none">Lecturer HUB</h1><p className="text-[7px] text-emerald-500 font-bold truncate max-w-[120px] mt-1">{currentUser?.nama_pensyarah || currentUser?.nama}</p></div>
                        </div>
                        <button onClick={onLogout} className="p-2 bg-slate-800 rounded-lg text-red-400 active:scale-90 shadow-inner"><Icon name="log-out" size={16}/></button>
                    </div>
                    <div className="p-4 bg-slate-900/40 border-b border-slate-800 shrink-0 text-left">
                        <div className="relative">
                            <Icon name="search" className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500" size={12} />
                            <input value={searchQuery} onChange={e => setSearchQuery(e.target.value)} className="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-2.5 pl-9 text-white focus:border-emerald-500 outline-none text-[10px] shadow-inner font-bold" placeholder="Cari nama pelajar seliaan..." />
                        </div>
                    </div>
                    <div className="flex-1 overflow-y-auto no-scrollbar p-3 space-y-2 pb-24 bg-[#020617]">
                        {filtered.length > 0 ? filtered.map((s, idx) => (
                            <motion.div whileTap={{ scale: 0.98 }} key={idx} onClick={() => { setSelectedStudent({...s}); setActiveEvalTab('amali3'); }} className="glass-morphism p-3 rounded-2xl flex items-center gap-3 border-slate-800 active:border-emerald-500 transition-all shadow-md text-left">
                                <div className="w-12 h-12 rounded-xl bg-slate-800 overflow-hidden border border-slate-700 shrink-0 flex items-center justify-center">
                                    {s.url_gambar ? <img src={s.url_gambar} className="w-full h-full object-cover" /> : <Icon name="user" className="text-slate-700" size={20} />}
                                </div>
                                <div className="flex-1 overflow-hidden">
                                    <h4 className="font-black text-white text-[10px] uppercase truncate tracking-tight font-bold mb-1">{s.nama}</h4>
                                    <p className="text-[7px] font-bold text-emerald-500 uppercase tracking-tighter opacity-80">{s.kelas} | Siri {s.siri}</p>
                                </div>
                                <div className="text-right shrink-0">
                                    <p className="text-xs font-black text-emerald-400 leading-none">{s.marks?.total || s.val_total}%</p>
                                    <p className="text-[6px] font-bold text-slate-500 mt-0.5 uppercase tracking-widest opacity-40">Score</p>
                                </div>
                            </motion.div>
                        )) : <div className="py-20 text-center glass-morphism rounded-[30px] border-dashed border-slate-800 border-2 shadow-inner"><p className="text-slate-700 font-black uppercase text-[8px] tracking-[0.4em] italic leading-tight text-center">Data Tidak Ditemui</p></div>}
                    </div>
                </div>
            );
        };

        const EvaluationPanel = ({ student, activeTab, setActiveTab, setSelectedStudent, saveMarks, syncing }) => {
            const [isSuccess, setIsSuccess] = useState(false);
            const hp3Wajaran = useMemo(() => {
                const totalRaw = (student.marks?.hp3_items || [70,70,70,70,70,70]).reduce((a, b) => a + b, 0);
                return ((totalRaw / 600) * 25).toFixed(2);
            }, [student.marks.hp3_items]);

            const adjustHP8 = (type, amount) => {
                const key = type === 'ind' ? 'hp8_ind' : 'hp8_kum';
                const max = type === 'ind' ? 20 : 30;
                const currentVal = parseFloat(student.marks[key]) || 0;
                const newVal = Math.min(max, Math.max(0, currentVal + amount));
                setSelectedStudent(prev => ({ ...prev, marks: { ...prev.marks, [key]: newVal.toString() } }));
            };

            const handleSave = async () => {
                const success = await saveMarks();
                if (success) setIsSuccess(true);
            };

            return (
                <motion.div initial={{ y: '100%' }} animate={{ y: 0 }} exit={{ y: '100%' }} transition={{ type: 'spring', damping: 30, stiffness: 250 }} className="fixed inset-0 z-50 bg-[#020617] flex flex-col h-full overflow-hidden">
                    {isSuccess ? (
                        <div className="flex-1 flex flex-col items-center justify-center p-10 text-center">
                            <Icon name="check-circle" size={80} className="text-emerald-500 mb-6 animate-bounce" />
                            <h2 className="text-2xl font-black text-white uppercase mb-2">Berjaya Disimpan!</h2>
                            <p className="text-slate-500 text-sm mb-8 leading-relaxed text-center">Pemarkahan bagi {student.nama} telah dihantar ke Cloud.</p>
                            <button onClick={() => { setIsSuccess(false); setSelectedStudent(null); }} className="px-10 py-4 bg-emerald-500 text-slate-950 font-black rounded-2xl shadow-xl active:scale-95 transition-all flex items-center gap-2">
                                <Icon name="arrow-left" size={18}/> KEMBALI KE SENARAI
                            </button>
                        </div>
                    ) : (
                        <>
                            <div className="p-4 bg-slate-900 border-b border-slate-800 flex items-center gap-4 shrink-0 shadow-2xl relative z-10 text-center">
                                <button onClick={() => setSelectedStudent(null)} className="p-2 bg-slate-800 rounded-xl text-slate-400 border border-slate-700 active:scale-90 shrink-0 shadow-inner"><Icon name="chevron-left" size={20}/></button>
                                <div className="w-24 h-24 rounded-[30px] bg-slate-800 overflow-hidden border-4 border-emerald-500/20 shrink-0 shadow-2xl relative ring-4 ring-emerald-500/5 mx-auto">
                                    {student.url_gambar ? <img src={student.url_gambar} className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center text-slate-700 bg-slate-950 font-black italic">BIG</div>}
                                </div>
                                <div className="flex-1 overflow-hidden text-left">
                                    <h2 className="text-[13px] font-black text-white uppercase truncate mb-1 tracking-tight leading-none font-bold">{student.nama}</h2>
                                    <p className="text-[8px] font-bold text-slate-500 truncate mb-1 uppercase opacity-70 leading-none">{student.kelas} | Siri {student.siri}</p>
                                    <div className="flex gap-2">
                                        <div className="px-2 py-0.5 bg-emerald-500/10 border border-emerald-500/20 rounded-lg shadow-sm font-black text-[9px] text-emerald-400">IND: {student.marks.hp8_ind}</div>
                                        <div className="px-2 py-0.5 bg-blue-500/10 border border-blue-500/20 rounded-lg shadow-sm font-black text-[9px] text-blue-400">KUM: {student.marks.hp8_kum}</div>
                                    </div>
                                </div>
                            </div>

                            <div className="px-4 py-2 flex gap-2 bg-slate-900 border-b border-slate-800 shrink-0 overflow-x-auto no-scrollbar z-10">
                                {[{id:'amali3',icon:'activity',l:'AMALI 3'},{id:'amali2',icon:'layers',l:'AMALI 2'},{id:'kuiz',icon:'trophy',l:'KUIZ'}].map(t => (
                                    <button key={t.id} onClick={() => setActiveTab(t.id)} className={`flex-1 min-w-[80px] py-2.5 rounded-xl flex flex-col items-center gap-1 transition-all ${activeTab === t.id ? 'tab-active' : 'bg-slate-800 text-slate-500 shadow-inner'}`}>
                                        <Icon name={t.icon} size={14}/><span className="text-[8px] font-black tracking-widest uppercase leading-none font-bold">{t.l}</span>
                                    </button>
                                ))}
                            </div>

                            <div className="flex-1 overflow-y-auto p-4 pb-32 no-scrollbar bg-[#020617] relative z-0 text-left">
                                {activeTab === 'amali3' && (
                                    <div className="space-y-4 animate-in fade-in duration-300">
                                        <div className="p-4 glass-morphism rounded-3xl border-emerald-500/10 space-y-4 shadow-xl">
                                            <div className="flex justify-between items-center"><span className="text-[8px] font-black text-white uppercase tracking-widest flex items-center gap-2 font-bold"><Icon name="user-check" size={12}/> HP8 INDIVIDU (MAX 20)</span><span className="text-xl font-black text-emerald-400 font-mono shadow-inner">{student.marks.hp8_ind}</span></div>
                                            <div className="flex gap-2">
                                                <button onClick={() => adjustHP8('ind', 1)} className="flex-1 py-3 bg-emerald-500 text-slate-950 font-black rounded-xl text-[9px] uppercase shadow-lg active:scale-95 transition-all font-bold">+ MERIT</button>
                                                <button onClick={() => adjustHP8('ind', -1)} className="flex-1 py-3 bg-red-500 text-white rounded-xl font-black text-[9px] uppercase shadow-lg active:scale-95 transition-all font-bold">- DEMERIT</button>
                                            </div>
                                        </div>
                                        <div className="p-4 glass-morphism rounded-3xl border-blue-500/10 space-y-4 shadow-xl text-left">
                                            <div className="flex justify-between items-center"><span className="text-[8px] font-black text-white uppercase tracking-widest flex items-center gap-2 font-bold"><Icon name="users" size={12}/> HP8 KUMPULAN (MAX 30)</span><span className="text-xl font-black text-blue-400 font-mono shadow-inner">{student.marks.hp8_kum}</span></div>
                                            <div className="flex gap-2">
                                                <button onClick={() => adjustHP8('kum', 1)} className="flex-1 py-3 bg-emerald-500 text-slate-950 font-black rounded-xl text-[9px] uppercase shadow-lg active:scale-95 transition-all font-bold">+ MERIT</button>
                                                <button onClick={() => adjustHP8('kum', -1)} className="flex-1 py-3 bg-red-500 text-white rounded-xl font-black text-[9px] uppercase shadow-lg active:scale-95 transition-all font-bold">- DEMERIT</button>
                                            </div>
                                        </div>
                                        <div className="space-y-2 mt-4 pt-4 border-t border-slate-800">
                                            <div className="flex justify-between items-center mb-3 px-2">
                                                <p className="text-[7px] font-black text-slate-500 uppercase tracking-[0.4em]">AMALI PRAKTIKAL (25%)</p>
                                                <span className="text-[9px] font-black text-emerald-400 font-mono leading-none">{hp3Wajaran}%</span>
                                            </div>
                                            {["Kecergasan", "Pemakanan", "Kembara", "Keyakinan Air", "Rakit / Kayak", "Tali Tinggi"].map((label, idx) => (
                                                <div key={label} className="p-3 glass-morphism rounded-2xl border-slate-800/50 shadow-inner">
                                                    <div className="flex justify-between items-center mb-1.5"><span className="text-[8px] font-black text-white uppercase tracking-tight text-left flex-1 font-bold">{idx+1}. {label}</span><span className="text-sm font-black text-emerald-500 font-mono">{student.marks.hp3_items[idx]}%</span></div>
                                                    <input type="range" min="0" max="100" value={student.marks.hp3_items[idx]} onChange={e => {
                                                        const newM = [...student.marks.hp3_items];
                                                        newM[idx] = parseInt(e.target.value);
                                                        setSelectedStudent(prev => ({...prev, marks: {...prev.marks, hp3_items: newM}}));
                                                    }} className="giant-slider" />
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                {activeTab === 'amali2' && (
                                    <div className="space-y-4 animate-in fade-in duration-300">
                                        <div className="grid grid-cols-2 gap-3 text-center">
                                            {[{k:'hp4',l:'HP4 (15)'},{k:'hp5',l:'HP5 (10)'}].map(item => (
                                                <div key={item.k} className="p-6 glass-morphism rounded-3xl border border-slate-800 shadow-2xl">
                                                    <label className="text-[8px] font-black text-slate-500 uppercase block mb-3 tracking-widest leading-none font-bold font-black">{item.l}</label>
                                                    <input type="number" value={student.marks[item.k]} onChange={e => setSelectedStudent(prev => ({...prev, marks: {...prev.marks, [item.k]: e.target.value}}))} className="w-full bg-transparent text-center text-4xl font-black text-white outline-none focus:text-emerald-400 shadow-inner font-black" />
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                {activeTab === 'kuiz' && (
                                    <div className="space-y-4 animate-in fade-in duration-300 px-2">
                                        {['kuiz1', 'kuiz2'].map(k => (
                                            <div key={k} className="p-8 glass-morphism rounded-[40px] text-center border-emerald-500/5 shadow-2xl">
                                                <label className="text-[10px] font-black text-slate-500 uppercase tracking-[0.4em] mb-3 block leading-none font-bold font-black">{k.toUpperCase()}</label>
                                                <input type="number" value={student.marks[k]} onChange={e => setSelectedStudent(prev => ({...prev, marks: {...prev.marks, [k]: e.target.value}}))} className="w-full bg-transparent text-center text-7xl font-black text-white border-none outline-none focus:text-emerald-400 shadow-inner font-black" />
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                            <div className="p-4 bg-slate-900 border-t border-slate-800 fixed bottom-0 w-full z-20 shrink-0 shadow-[0_-15px_40px_rgba(0,0,0,0.7)] backdrop-blur-xl">
                                <button onClick={handleSave} disabled={syncing} className="w-full py-4 rounded-2xl bg-emerald-500 text-slate-950 font-black text-xs flex items-center justify-center gap-3 shadow-[0_0_30px_rgba(16,185,129,0.3)] active:scale-95 transition-all uppercase leading-none font-bold font-black font-black">
                                    {syncing ? <div className="w-4 h-4 border-2 border-slate-950 border-t-transparent rounded-full animate-spin"></div> : <Icon name="save" size={16}/>}
                                    SIMPAN PEMARKAHAN CLOUD
                                </button>
                            </div>
                        </>
                    )}
                </motion.div>
            );
        };

        const StudentPortal = ({ currentUser, onLogout, saveBiodata, syncing }) => {
            const [formData, setFormData] = useState({ siri: currentUser.siri || '', kumpulan: currentUser.kumpulan || '', no_kumpulan: currentUser.no_kumpulan || '', alahan: currentUser.alahan || '', tel_kecemasan: currentUser.tel_kecemasan || '', url_gambar: currentUser.url_gambar || '' });
            const [preview, setPreview] = useState(currentUser.url_gambar || null);
            const fileInputRef = useRef(null);

            const handleImageChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        const base64String = reader.result;
                        setPreview(base64String);
                        setFormData(prev => ({...prev, url_gambar: base64String}));
                    };
                    reader.readAsDataURL(file);
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-2 bg-[#020617] overflow-y-auto no-scrollbar">
                    <motion.div initial={{ scale: 0.95, opacity: 0 }} animate={{ scale: 1, opacity: 1 }} className="w-full max-w-lg glass-morphism rounded-[40px] overflow-hidden shadow-2xl my-4 border-emerald-500/10 text-center">
                        <div className="bg-emerald-500 p-6 flex flex-col items-center shadow-lg">
                            <div className="w-20 h-20 bg-slate-950 rounded-[30px] p-1 mb-3 shadow-2xl overflow-hidden border-4 border-slate-950/20">
                                {preview ? <img src={preview} className="w-full h-full object-cover" /> : <div className="p-6 text-emerald-500 flex items-center justify-center"><Icon name="user" size={40}/></div>}
                            </div>
                            <h2 className="text-xl font-black text-slate-950 uppercase leading-none italic tracking-tight font-bold">{currentUser?.nama}</h2>
                            <p className="text-[8px] font-black text-slate-900/60 uppercase mt-1 tracking-widest bg-slate-950/10 px-3 py-1 rounded-full">Peserta BIG 2026</p>
                        </div>
                        <div className="p-4 space-y-3">
                            <div className="grid grid-cols-2 gap-2 text-left text-xs">
                                <div className="space-y-0.5"><label className="text-[7px] font-black text-slate-500 uppercase px-1">Siri BIG</label><input value={formData.siri} onChange={e => setFormData(p=>({...p, siri: e.target.value}))} className="form-input shadow-inner" /></div>
                                <div className="space-y-0.5"><label className="text-[7px] font-black text-slate-500 uppercase px-1">Kumpulan</label><select value={formData.kumpulan.toUpperCase()} onChange={e => setFormData(p=>({...p, kumpulan: e.target.value}))} className="form-input appearance-none font-bold font-black"><option value="">Pilih</option>{KUMPULAN_LIST.map(k => <option key={k} value={k}>{k}</option>)}</select></div>
                            </div>
                            <div className="grid grid-cols-2 gap-2 text-left text-xs">
                                <div className="space-y-0.5">
                                    <label className="text-[7px] font-black text-slate-500 uppercase px-1">No. Ahli</label>
                                    <select value={formData.no_kumpulan} onChange={e => setFormData(p=>({...p, no_kumpulan: e.target.value}))} className="form-input appearance-none font-bold font-black">
                                        <option value="">Pilih</option>
                                        {NO_AHLI_LIST.map(n => <option key={n} value={n}>{n}</option>)}
                                    </select>
                                </div>
                                <div className="space-y-0.5"><label className="text-[7px] font-black text-slate-500 uppercase px-1">Unit/Kelas</label><input value={currentUser.kelas} disabled className="form-input opacity-50 bg-slate-900 cursor-not-allowed" /></div>
                            </div>
                            <div className="pt-2">
                                <input type="file" ref={fileInputRef} onChange={handleImageChange} className="hidden" accept="image/*" />
                                <button onClick={() => fileInputRef.current.click()} className="w-full py-2.5 bg-slate-800 border border-slate-700 rounded-xl text-[10px] font-black text-white uppercase flex items-center justify-center gap-2 active:scale-95 transition-all">
                                    <Icon name="camera" size={14}/> MUAT NAIK GAMBAR
                                </button>
                                {formData.url_gambar && <p className="text-[7px] text-emerald-500 font-bold mt-1 uppercase tracking-widest text-center">Gambar Sedia Dikemaskini</p>}
                            </div>
                            <div className="pt-4 space-y-2 border-t border-slate-800/50 text-center">
                                <button onClick={() => saveBiodata(formData)} disabled={syncing} className="w-full py-3 bg-emerald-500 text-slate-950 font-black rounded-xl text-[10px] uppercase shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2 font-bold">
                                    {syncing ? <div className="w-3 h-3 border-2 border-slate-950 border-t-transparent rounded-full animate-spin"></div> : <Icon name="save" size={14}/>} SIMPAN BIODATA
                                </button>
                                <button onClick={onLogout} className="w-full py-2 text-[8px] font-black uppercase text-slate-500 tracking-[0.4em] border border-slate-800/50 rounded-xl hover:bg-red-500/5 transition-colors">Tamat Sesi</button>
                            </div>
                        </div>
                    </motion.div>
                </div>
            );
        };

        // --- MAIN APP COMPONENT ---

        function App() {
            const [view, setView] = useState('login');
            const [role, setRole] = useState('staff'); 
            const [currentUser, setCurrentUser] = useState(null);
            const [students, setStudents] = useState([]);
            const [lecturers, setLecturers] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedStudent, setSelectedStudent] = useState(null);
            const [activeEvalTab, setActiveEvalTab] = useState('amali3');
            const [syncing, setSyncing] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');

            const fetchData = useCallback(async () => {
                setSyncing(true);
                try {
                    const [resS, resL, resM] = await Promise.all([
                        fetch(`${CSV_STUDENTS_URL}&t=${Date.now()}`).then(r => r.text()),
                        fetch(`${CSV_LECTURERS_URL}&t=${Date.now()}`).then(r => r.text()),
                        fetch(`${CSV_MARKS_URL}&t=${Date.now()}`).then(r => r.text())
                    ]);
                    const pL = parseCSV(resL);
                    const pM = parseCSV(resM);
                    const pS = parseCSV(resS).map(s => {
                        const mD = pM.find(m => m.no_kp?.toString().trim() === s.no_kp?.toString().trim()) || {};
                        return {
                            ...s,
                            assigned_lecturer: mD.assigned_lecturer || s.nama_pensyarah || '',
                            marks: {
                                kuiz1: mD.val_kuiz1 || '0', 
                                kuiz2: mD.val_kuiz2 || '0',
                                hp3_items: [70, 70, 70, 70, 70, 70],
                                hp4: mD.val_hp4 || '10.5', 
                                hp5: mD.val_hp5 || '7',    
                                hp8_ind: mD.val_hp8_ind || '14', 
                                hp8_kum: mD.val_hp8_kum || '21',
                                total: mD.val_total || '0'
                            }
                        };
                    }).filter(s => s.nama);
                    setStudents(pS);
                    setLecturers(pL);
                } catch (e) { console.error("Sync Error:", e); }
                finally { setSyncing(false); setLoading(false); }
            }, []);

            useEffect(() => { fetchData(); }, [fetchData]);

            const handleLogin = (e) => {
                e.preventDefault();
                const email = e.target.email?.value.trim().toLowerCase();
                const pass = e.target.password?.value.trim();
                const ic = e.target.ic?.value.trim();

                if (role === 'student') {
                    const found = students.find(s => s.no_kp === ic);
                    if (found) { setCurrentUser(found); setView('student_portal'); }
                    else alert("Identiti pelajar tidak dikesan.");
                } else {
                    if (email === ADMIN_EMAIL && (pass === '123456' || pass === '30621')) {
                        setCurrentUser({ nama_pensyarah: 'Haniff Faizal', email: ADMIN_EMAIL });
                        setRole('admin'); setView('admin_dashboard');
                    } else {
                        const lect = lecturers.find(l => (l.email === email || l.email_rasmi === email) && l.password.toString() === pass);
                        if (lect) { setCurrentUser(lect); setRole('staff'); setView('lecturer_dashboard'); }
                        else alert("Akses Ditolak.");
                    }
                }
            };

            const onLogout = () => { setView('login'); setCurrentUser(null); setSelectedStudent(null); setRole('staff'); };

            const saveMarks = async () => {
                if (!selectedStudent) return false;
                setSyncing(true);
                const hp3_w = (selectedStudent.marks.hp3_items.reduce((a, b) => a + b, 0) / 600) * 25;
                try {
                    const payload = {
                        target: 'markah',
                        no_kp: selectedStudent.no_kp,
                        data: {
                            'Kuiz1': selectedStudent.marks.kuiz1,
                            'Kuiz2': selectedStudent.marks.kuiz2,
                            'HP4 (10%)': selectedStudent.marks.hp4,
                            'HP5 (10%)': selectedStudent.marks.hp5,
                            'HP8 Ind (15%)': selectedStudent.marks.hp8_ind,
                            'HP8 Kum (30%)': selectedStudent.marks.hp8_kum,
                            'HP3 (25%)': hp3_w.toFixed(2)
                        }
                    };
                    await fetch(GOOGLE_SHEET_API_URL, { method: 'POST', body: JSON.stringify(payload) });
                    setTimeout(fetchData, 1500);
                    return true;
                } catch (e) { alert("Ralat Simpanan Cloud."); return false; }
                finally { setSyncing(false); }
            };

            const saveBiodata = async (formData) => {
                setSyncing(true);
                try {
                    const payload = { 
                        target: 'biodata', 
                        no_kp: currentUser.no_kp, 
                        data: {
                            'SIRI BIG': formData.siri,
                            'KUMPULAN BIG': formData.kumpulan,
                            'No Dalam Kumpulan': formData.no_kumpulan,
                            'Url Gambar': formData.url_gambar
                        }
                    };
                    await fetch(GOOGLE_SHEET_API_URL, { method: 'POST', body: JSON.stringify(payload) });
                    alert("Biodata dikemaskini!");
                    fetchData();
                } catch (e) { alert("Ralat."); }
                finally { setSyncing(false); }
            };

            const onQuickScan = (student) => {
                setSelectedStudent(student);
                setActiveEvalTab('amali3');
                if (!currentUser) { setCurrentUser({ nama: 'Pemerhati' }); setRole('staff'); }
                setView('lecturer_dashboard'); 
            };

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center gap-6 bg-[#020617]">
                    <div className="w-10 h-10 border-4 border-emerald-500/10 border-t-emerald-500 rounded-full animate-spin shadow-2xl"></div>
                    <p className="text-emerald-500 font-bold text-[8px] animate-pulse uppercase tracking-[0.3em]">MENGHUBUNGKAN PANGKALAN DATA...</p>
                </div>
            );

            return (
                <div className="selection:bg-emerald-500/30 overflow-hidden text-center">
                    {view === 'login' && <LoginView role={role} setRole={setRole} handleLogin={handleLogin} students={students} onQuickScan={onQuickScan} />}
                    {view === 'admin_dashboard' && <AdminDashboard students={students} onLogout={onLogout} onSelectStudent={(s) => { setSelectedStudent(s); setActiveEvalTab('amali3'); }} />}
                    {view === 'lecturer_dashboard' && (
                        <LecturerDashboard 
                            currentUser={currentUser} students={students} 
                            searchQuery={searchQuery} setSearchQuery={setSearchQuery} 
                            setSelectedStudent={setSelectedStudent} setActiveEvalTab={setActiveEvalTab} 
                            onLogout={onLogout}
                            isAdmin={role === 'admin'}
                        />
                    )}
                    {view === 'student_portal' && <StudentPortal currentUser={currentUser} onLogout={onLogout} saveBiodata={saveBiodata} syncing={syncing} />}
                    
                    <AnimatePresence>
                        {selectedStudent && (
                            <EvaluationPanel 
                                student={selectedStudent} activeTab={activeEvalTab} setActiveTab={setActiveEvalTab} 
                                setSelectedStudent={setSelectedStudent} saveMarks={saveMarks} syncing={syncing} 
                            />
                        )}
                    </AnimatePresence>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
