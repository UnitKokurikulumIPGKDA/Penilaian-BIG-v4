<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIG 2026 LIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: white; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; }
        .glass-input { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; border-radius: 12px; padding: 12px; width: 100%; text-align: center; }
        select option { background-color: #1e293b; color: white; }
        .nav-active { background: linear-gradient(135deg, #6366f1, #a855f7); }
        .content-section { display: none; }
        .content-section.active { display: block; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="loader" class="fixed inset-0 z-[100] glass flex-col items-center justify-center hidden" style="display:none">
        <div class="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
    </div>

    <nav class="max-w-4xl mx-auto flex gap-2 mb-8 overflow-x-auto no-scrollbar">
        <button onclick="nav('kuiz')" id="btn-kuiz" class="nav-btn glass px-6 py-3 text-[10px] font-bold active nav-active">KUIZ (30%)</button>
        <button onclick="nav('amali1')" id="btn-amali1" class="nav-btn glass px-6 py-3 text-[10px] font-bold">AMALI 1 (20%)</button>
        <button onclick="nav('hp3')" id="btn-hp3" class="nav-btn glass px-6 py-3 text-[10px] font-bold">HP3 (25%)</button>
        <button onclick="nav('hp8')" id="btn-hp8" class="nav-btn glass px-6 py-3 text-[10px] font-bold">HP8 (45%)</button>
    </nav>

    <main class="max-w-4xl mx-auto">
        <div class="glass p-8 mb-6">
            <div class="flex flex-col md:flex-row gap-8 items-center mb-6">
                <div id="photo-box" class="w-32 h-32 glass rounded-3xl overflow-hidden flex items-center justify-center border-2 border-white/10">
                    <i class="fas fa-user-circle text-5xl opacity-10"></i>
                </div>
                <select id="sel-student" onchange="loadStudent(this.value)" class="glass-input text-left"><option value="">PILIH PELAJAR</option></select>
            </div>

            <section id="kuiz" class="content-section active">
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <input type="number" id="k1" placeholder="K1 (15%)" max="15" class="glass-input">
                    <input type="number" id="k2" placeholder="K2 (15%)" max="15" class="glass-input">
                </div>
                <button onclick="save()" class="w-full bg-indigo-600 p-4 rounded-2xl font-black">SIMPAN KUIZ</button>
            </section>

            <section id="amali1" class="content-section">
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <input type="number" id="a1_hp4" placeholder="HP4 (10%)" max="10" class="glass-input">
                    <input type="number" id="a1_hp5" placeholder="HP5 (10%)" max="10" class="glass-input">
                </div>
                <button onclick="save()" class="w-full bg-purple-600 p-4 rounded-2xl font-black">SIMPAN AMALI 1</button>
            </section>

            <section id="hp3" class="content-section">
                <div class="grid grid-cols-3 gap-2 mb-6">
                    <input type="number" id="hp3_p4" placeholder="P4(10%)" max="10" class="glass-input">
                    <input type="number" id="hp3_kat10" placeholder="KAT10(10%)" max="10" class="glass-input">
                    <input type="number" id="hp3_a5" placeholder="A5(5%)" max="5" class="glass-input">
                </div>
                <button onclick="save()" class="w-full bg-emerald-600 p-4 rounded-2xl font-black">SIMPAN HP3</button>
            </section>

            <section id="hp8" class="content-section">
                <div class="grid grid-cols-2 gap-2 mb-4">
                    <input type="number" id="hp8_ind_p4" placeholder="IND P4(10%)" max="10" class="glass-input">
                    <input type="number" id="hp8_ind_kat10" placeholder="IND KAT10(5%)" max="5" class="glass-input">
                </div>
                <div class="grid grid-cols-3 gap-2 mb-6">
                    <input type="number" id="hp8_kump_hp8" placeholder="KUMP HP8(10%)" max="10" class="glass-input">
                    <input type="number" id="hp8_kump_p4" placeholder="KUMP P4(10%)" max="10" class="glass-input">
                    <input type="number" id="hp8_kump_kat10" placeholder="KUMP KAT10(10%)" max="10" class="glass-input">
                </div>
                <button onclick="save()" class="w-full bg-blue-600 p-4 rounded-2xl font-black">SIMPAN HP8</button>
            </section>
        </div>
    </main>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbyCTEXTf1BT7tY_Z6SsuN8knvUmZJSpoRluSffTpUhJygURjmcibkZYgHdlC6LSt3wljw/exec"; 
        let allStudents = [], existingScores = {};

        window.onload = async () => {
            const res = await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'get_data' }) });
            const d = await res.json();
            allStudents = d.data.students; existingScores = d.data.scores;
            const sel = document.getElementById('sel-student');
            allStudents.forEach(s => sel.innerHTML += `<option value="${s.ID_SISTEM}">${s.Nama_Pelajar}</option>`);
        };

        async function loadStudent(id) {
            if(!id) return;
            const photoRes = await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'get_photo', studentId: id }) });
            const photoData = await photoRes.json();
            document.getElementById('photo-box').innerHTML = photoData.result === 'success' ? `<img src="${photoData.photoData}" class="w-full h-full object-cover">` : '<i class="fas fa-user-slash opacity-20 text-4xl"></i>';
            
            const s = existingScores[id] || [];
            const fields = ['k1','k2','a1_hp4','a1_hp5','hp3_p4','hp3_kat10','hp3_a5','hp8_ind_p4','hp8_ind_kat10','hp8_kump_hp8','hp8_kump_p4','hp8_kump_kat10'];
            fields.forEach((f, i) => { if(document.getElementById(f)) document.getElementById(f).value = s[i+5] || ""; });
        }

        async function save() {
            const id = document.getElementById('sel-student').value;
            if(!id) return alert("Pilih pelajar!");
            const student = allStudents.find(s => s.ID_SISTEM === id);
            const formData = { ID_SISTEM: id, Nama_Pelajar: student.Nama_Pelajar, Kelas: student.Kelas };
            ['k1','k2','a1_hp4','a1_hp5','hp3_p4','hp3_kat10','hp3_a5','hp8_ind_p4','hp8_ind_kat10','hp8_kump_hp8','hp8_kump_p4','hp8_kump_kat10'].forEach(f => { if(document.getElementById(f)) formData[f] = document.getElementById(f).value; });
            
            await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'save_mark', userEmail: "pensyarah@ipg.edu.my", formData }) });
            alert("Berjaya disimpan secara LIVE!");
        }

        function nav(id) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            document.getElementById('btn-'+id).classList.add('nav-active');
        }
    </script>
</body>
</html>
