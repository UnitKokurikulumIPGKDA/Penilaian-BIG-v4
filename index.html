<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIG HUB - Penilaian Bersepadu 2026</title>
    
    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #020617;
            color: #f8fafc;
            margin: 0;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .giant-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 10px;
            background: #1e293b;
            border-radius: 10px;
            outline: none;
            margin: 8px 0;
            border: 1px solid #334155;
        }

        .giant-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 32px;
            height: 32px;
            background: #10b981;
            border-radius: 50%;
            cursor: pointer;
            border: 4px solid #0f172a;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }

        .glass-morphism {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(16, 185, 129, 0.15);
        }

        .tab-active {
            background: #10b981 !important;
            color: #020617 !important;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
            font-weight: 800;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }

        .filter-select {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 6px 10px;
            color: #10b981;
            font-size: 0.6rem;
            font-weight: 800;
            outline: none;
            width: 100%;
            appearance: none;
        }

        .form-input {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 8px 12px;
            width: 100%;
            color: white;
            font-size: 0.75rem;
            outline: none;
            transition: all 0.2s;
        }

        .form-input:focus {
            border-color: #10b981;
            box-shadow: 0 0 0 1px #10b981;
        }

        .scan-pulse {
            animation: scan-pulse 2s infinite;
        }
        @keyframes scan-pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 12px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        // --- KONFIGURASI URL ---
        const CSV_STUDENTS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTK1rQeMq2o_-KpvnhW8aitybwhR0cud8bxLgc7rs46GFba0lFnzsepdSHBR4qTYyP0eapgbbHXtsOG/pub?output=csv";
        const CSV_LECTURERS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTK1rQeMq2o_-KpvnhW8aitybwhR0cud8bxLgc7rs46GFba0lFnzsepdSHBR4qTYyP0eapgbbHXtsOG/pub?gid=465305263&single=true&output=csv";
        const CSV_MARKS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTK1rQeMq2o_-KpvnhW8aitybwhR0cud8bxLgc7rs46GFba0lFnzsepdSHBR4qTYyP0eapgbbHXtsOG/pub?gid=1325589771&single=true&output=csv";
        const GOOGLE_SHEET_API_URL = "https://script.google.com/macros/s/AKfycbyCTEXTf1BT7tY_Z6SsuN8knvUmZJSpoRluSffTpUhJygURjmcibkZYgHdlC6LSt3wljw/exec"; 

        const ADMIN_EMAIL = 'haniff.faizal@ipgm.edu.my';
        const KUMPULAN_LIST = ["GREY", "UNGU", "PINK", "KUNING", "BIRU", "HIJAU", "BIRU GELAP", "COKLAT", "JINGGA", "MERAH"];
        
        const COLOR_MAP = {
            "PINK": "P", "UNGU": "U", "GREY": "G", "KUNING": "K", 
            "BIRU": "B", "HIJAU": "H", "BIRU GELAP": "BG", 
            "COKLAT": "C", "JINGGA": "J", "MERAH": "M"
        };

        const parseCSV = (text) => {
            const rows = text.split(/\r?\n/).filter(r => r.trim());
            if (!rows.length) return [];
            const headers = rows[0].split(',').map(h => h.trim().replace(/"/g, '').toLowerCase());
            return rows.slice(1).map(row => {
                const values = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.trim().replace(/"/g, ''));
                let obj = {};
                headers.forEach((h, i) => {
                    let key = h.replace(/ /g, '_');
                    // Pemetaan teguh berdasarkan visual sheet
                    if (h.includes('siri_big') || h === 'siri big' || h.includes('siri')) key = 'siri';
                    else if (h.includes('nama_pelajar') || h === 'nama') key = 'nama';
                    else if (h.includes('no_kp')) key = 'no_kp';
                    else if (h.includes('url_gambar') || h === 'gambar') key = 'url_gambar';
                    else if (h.includes('pensyarah') || h.includes('pc_nsyarah')) key = 'nama_pensyarah';
                    else if (h.includes('kumpula') || h.includes('kumpulan')) key = 'kumpulan';
                    else if (h.includes('no_dalam_kumpulan') || h.includes('no_kumpulan')) key = 'no_kumpulan';
                    else if (h.includes('alahan')) key = 'alahan';
                    else if (h.includes('tel_kecemasan') || h.includes('kecemasan')) key = 'tel_kecemasan';
                    else if (h === 'email') key = 'email';
                    else if (h === 'password') key = 'password';
                    else if (h === 'kelas' || h.includes('unit')) key = 'kelas';
                    obj[key] = values[i] || '';
                });
                return obj;
            });
        };

        // --- ADMIN DASHBOARD ---

        const AdminDashboard = ({ students, onLogout, onSelectStudent }) => {
            const [search, setSearch] = useState('');
            const stats = useMemo(() => {
                const validMarks = students.map(s => parseFloat(s.marks?.total) || 0).filter(m => m > 0);
                const avg = validMarks.length ? (validMarks.reduce((a,b) => a+b, 0) / validMarks.length).toFixed(1) : 0;
                const passCount = validMarks.filter(m => m >= 40).length;
                return { avg, total: students.length, passRate: ((passCount / (students.length || 1)) * 100).toFixed(0) };
            }, [students]);

            const filteredStudents = useMemo(() => {
                return students.filter(s => s.nama?.toLowerCase().includes(search.toLowerCase()));
            }, [students, search]);

            return (
                <div className="h-screen flex flex-col bg-[#020617] overflow-hidden">
                    <div className="p-4 bg-slate-900 border-b border-slate-800 flex items-center justify-between shrink-0 shadow-2xl z-50">
                        <div className="flex items-center gap-3">
                            <div className="w-8 h-8 bg-emerald-500 rounded-lg flex items-center justify-center font-black italic text-slate-950 text-xs shadow-lg">BIG</div>
                            <div>
                                <h1 className="font-black text-[10px] uppercase tracking-widest text-white leading-none">Admin Terminal</h1>
                                <p className="text-[7px] text-emerald-500 font-bold uppercase tracking-tighter">Haniff Faizal (Ketua Unit)</p>
                            </div>
                        </div>
                        <button onClick={onLogout} className="p-2 bg-slate-800 rounded-lg text-red-400 active:scale-90"><i data-lucide="log-out" size={16}></i></button>
                    </div>

                    <div className="flex-1 overflow-y-auto no-scrollbar p-4 space-y-4 bg-slate-950">
                        <div className="grid grid-cols-3 gap-2">
                            <div className="glass-morphism p-3 rounded-2xl text-center border-emerald-500/10 shadow-lg"><p className="text-[6px] font-black text-slate-500 uppercase mb-1">Purata Kohort</p><p className="text-lg font-black text-emerald-400">{stats.avg}%</p></div>
                            <div className="glass-morphism p-3 rounded-2xl text-center border-slate-800 shadow-lg"><p className="text-[6px] font-black text-slate-500 uppercase mb-1">Total Calon</p><p className="text-lg font-black text-white">{stats.total}</p></div>
                            <div className="glass-morphism p-3 rounded-2xl text-center border-cyan-500/10 shadow-lg"><p className="text-[6px] font-black text-slate-500 uppercase mb-1">Kadar Lulus</p><p className="text-lg font-black text-cyan-400">{stats.passRate}%</p></div>
                        </div>

                        <div className="space-y-2 pb-24">
                            <div className="flex items-center justify-between px-1">
                                <h3 className="text-[9px] font-black text-slate-500 uppercase tracking-widest">Senarai Pelajar (Penuh)</h3>
                                <div className="relative w-36">
                                    <i data-lucide="search" className="absolute left-2.5 top-1/2 -translate-y-1/2 text-slate-600 w-2.5 h-2.5"></i>
                                    <input value={search} onChange={e => setSearch(e.target.value)} className="bg-slate-900 border border-slate-800 rounded-lg py-1.5 pl-7 pr-2 text-[8px] text-white w-full outline-none focus:border-emerald-500 shadow-inner" placeholder="Cari Pelajar..." />
                                </div>
                            </div>
                            <div className="space-y-1.5">
                                {filteredStudents.length > 0 ? filteredStudents.map((s, idx) => (
                                    <div key={idx} onClick={() => onSelectStudent(s)} className="glass-morphism p-3 rounded-2xl flex items-center gap-3 border-slate-800/50 active:scale-[0.98] transition-all cursor-pointer shadow-md">
                                        <div className="w-9 h-9 rounded-lg bg-slate-800 border border-slate-700 overflow-hidden shrink-0 flex items-center justify-center">
                                            {s.url_gambar ? <img src={s.url_gambar} className="w-full h-full object-cover" /> : <i data-lucide="user" className="m-auto text-slate-700 w-4 h-4"></i>}
                                        </div>
                                        <div className="flex-1 overflow-hidden text-left">
                                            <h4 className="text-[10px] font-black text-white uppercase truncate tracking-tight leading-none">{s.nama}</h4>
                                            <p className="text-[7px] text-slate-500 uppercase font-bold tracking-tighter">Unit: {s.kelas} | Siri: {s.siri}</p>
                                        </div>
                                        <div className="text-right shrink-0">
                                            <p className="text-[10px] font-black text-emerald-400">{s.marks?.total}%</p>
                                        </div>
                                    </div>
                                )) : <div className="py-10 text-center text-[9px] text-slate-600 uppercase tracking-widest italic opacity-50">Data Kosong</div>}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- LECTURER & STUDENT VIEWS ---

        const LoginView = ({ role, setRole, handleLogin, students, onQuickScan }) => {
            const [scanCode, setScanCode] = useState('');
            
            const handleScanInput = (e) => {
                const code = e.target.value.toUpperCase().trim();
                setScanCode(code);
                
                if (code.length >= 2) {
                    const found = students.find(s => {
                        const colorName = s.kumpulan?.toUpperCase();
                        const colorInitial = COLOR_MAP[colorName] || colorName?.charAt(0);
                        const tag = `${colorInitial}${s.no_kumpulan}`;
                        return tag === code;
                    });
                    if (found) {
                        onQuickScan(found);
                        setScanCode('');
                    }
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-[#020617]">
                    <motion.div initial={{ opacity: 0, scale: 0.95 }} animate={{ opacity: 1, scale: 1 }} className="w-full max-w-md glass-morphism p-8 rounded-[40px] border-emerald-500/20 shadow-2xl relative overflow-hidden">
                        <div className="absolute top-0 right-0 p-4 z-20">
                            <div className="relative w-20">
                                <input value={scanCode} onChange={handleScanInput} className="w-full bg-emerald-500/10 border border-emerald-500/40 rounded-lg py-1 px-2 text-center text-[10px] font-black text-emerald-400 outline-none scan-pulse placeholder:text-emerald-500/30" placeholder="TAG ID" />
                                <div className="absolute -bottom-4 w-full text-center text-[6px] text-slate-600 font-bold uppercase tracking-widest">SCAN TAG</div>
                            </div>
                        </div>

                        <div className="text-center mb-8 mt-6">
                            <div className="inline-flex p-3 bg-emerald-500/10 rounded-2xl mb-4 border border-emerald-500/20 shadow-lg">
                                <i data-lucide="shield-check" className="text-emerald-500 w-10 h-10"></i>
                            </div>
                            <h2 className="text-3xl font-black text-white italic tracking-tighter uppercase leading-none">BIG Hub.</h2>
                            <p className="text-slate-500 text-[9px] font-bold uppercase tracking-[0.4em] mt-3 border-t border-slate-800 pt-2 mx-10">Integrated Center</p>
                        </div>
                        
                        <form onSubmit={handleLogin} className="space-y-4">
                            <div className="flex p-1 bg-slate-800/40 rounded-xl border border-slate-700/50 shadow-inner">
                                <button type="button" onClick={() => setRole('staff')} className={`flex-1 py-2.5 text-[9px] font-black rounded-lg transition-all ${role === 'staff' ? 'bg-emerald-500 text-slate-950 shadow-lg' : 'text-slate-500'}`}>PENSYARAH</button>
                                <button type="button" onClick={() => setRole('student')} className={`flex-1 py-2.5 text-[9px] font-black rounded-lg transition-all ${role === 'student' ? 'bg-emerald-500 text-slate-950 shadow-lg' : 'text-slate-500'}`}>PELAJAR</button>
                            </div>
                            {role === 'student' ? (
                                <input name="ic" type="text" placeholder="Masukkan No. Kad Pengenalan" className="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 text-white outline-none focus:border-emerald-500 text-center font-bold tracking-widest shadow-inner text-sm" required />
                            ) : (
                                <div className="space-y-3">
                                    <input name="email" type="email" placeholder="Emel IPGM" className="w-full bg-slate-900 border border-slate-700 rounded-xl p-3.5 text-white outline-none focus:border-emerald-500 shadow-inner text-xs transition-all" required />
                                    <input name="password" type="password" placeholder="Kata Laluan" className="w-full bg-slate-900 border border-slate-700 rounded-xl p-3.5 text-white outline-none focus:border-emerald-500 shadow-inner text-xs transition-all" required />
                                </div>
                            )}
                            <button type="submit" className="w-full py-4 rounded-2xl bg-emerald-500 text-slate-950 font-black shadow-[0_0_20px_rgba(16,185,129,0.2)] active:scale-95 transition-all uppercase tracking-widest text-[10px]">Akses Penuh Hub</button>
                        </form>
                    </motion.div>
                </div>
            );
        };

        const LecturerDashboard = ({ currentUser, students, searchQuery, setSearchQuery, setSelectedStudent, setActiveEvalTab, onLogout, isAdmin }) => {
            const [fSiri, setFSiri] = useState('');
            const [fKelas, setFKelas] = useState('');
            const [fKump, setFKump] = useState('');
            const [fNo, setFNo] = useState('');

            const filtered = useMemo(() => {
                let list = students;
                // BUKAN ADMIN: Hanya lihat pelajar seliaan sendiri
                if (!isAdmin) {
                    list = list.filter(s => s.assigned_lecturer?.trim().toLowerCase() === currentUser?.nama_pensyarah?.trim().toLowerCase());
                }
                
                return list
                    .filter(s => fSiri === '' || s.siri === fSiri)
                    .filter(s => fKelas === '' || s.kelas === fKelas)
                    .filter(s => fKump === '' || s.kumpulan === fKump)
                    .filter(s => fNo === '' || s.no_kumpulan === fNo)
                    .filter(s => s.nama.toLowerCase().includes(searchQuery.toLowerCase()));
            }, [students, currentUser, searchQuery, fSiri, fKelas, fKump, fNo, isAdmin]);

            const options = useMemo(() => {
                const list = isAdmin ? students : students.filter(s => s.assigned_lecturer?.trim().toLowerCase() === currentUser?.nama_pensyarah?.trim().toLowerCase());
                const getUniq = (key) => [...new Set(list.map(s => s[key]).filter(v => v))].sort();
                return { siri: getUniq('siri'), kelas: getUniq('kelas'), kump: getUniq('kumpulan'), no: getUniq('no_kumpulan') };
            }, [students, currentUser, isAdmin]);

            return (
                <div className="h-screen flex flex-col overflow-hidden bg-slate-950">
                    <div className="p-4 bg-slate-900 border-b border-slate-800 flex items-center justify-between shrink-0 shadow-2xl z-50">
                        <div className="flex items-center gap-3">
                            <div className="w-8 h-8 bg-emerald-500 rounded-lg flex items-center justify-center font-black italic text-slate-950 text-[10px]">BIG</div>
                            <div><h1 className="font-black text-[9px] text-white uppercase tracking-widest leading-none">Lecturer HUB</h1><p className="text-[7px] text-emerald-500 font-bold truncate max-w-[120px] leading-none mt-1">{currentUser?.nama_pensyarah}</p></div>
                        </div>
                        <button onClick={onLogout} className="p-2 bg-slate-800 rounded-lg text-red-400 active:scale-90 shadow-inner"><i data-lucide="log-out" size={16}></i></button>
                    </div>

                    <div className="p-4 bg-slate-900/40 border-b border-slate-800 shrink-0">
                        <div className="grid grid-cols-4 gap-1 mb-3">
                            <select value={fSiri} onChange={e => setFSiri(e.target.value)} className="filter-select"><option value="">Siri</option>{options.siri.map(v => <option key={v} value={v}>{v}</option>)}</select>
                            <select value={fKelas} onChange={e => setFKelas(e.target.value)} className="filter-select"><option value="">Kelas</option>{options.kelas.map(v => <option key={v} value={v}>{v}</option>)}</select>
                            <select value={fKump} onChange={e => setFKump(e.target.value)} className="filter-select"><option value="">Kump</option>{options.kump.map(v => <option key={v} value={v}>{v}</option>)}</select>
                            <select value={fNo} onChange={e => setFNo(e.target.value)} className="filter-select"><option value="">No</option>{options.no.map(v => <option key={v} value={v}>{v}</option>)}</select>
                        </div>
                        <div className="relative">
                            <i data-lucide="search" className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 w-3 h-3"></i>
                            <input value={searchQuery} onChange={e => setSearchQuery(e.target.value)} className="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-2.5 pl-9 text-white focus:border-emerald-500 outline-none text-[9px] shadow-inner" placeholder="Cari nama pelajar..." />
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto no-scrollbar p-3 space-y-2 pb-24 bg-[#020617]">
                        {filtered.length > 0 ? filtered.map((s, idx) => (
                            <motion.div whileTap={{ scale: 0.98 }} key={idx} onClick={() => { setSelectedStudent({...s}); setActiveEvalTab('amali3'); }} className="glass-morphism p-3 rounded-2xl flex items-center gap-3 border-slate-800 active:border-emerald-500 transition-all shadow-md">
                                <div className="w-12 h-12 rounded-xl bg-slate-800 overflow-hidden border border-slate-700 shrink-0 flex items-center justify-center">
                                    {s.url_gambar ? <img src={s.url_gambar} className="w-full h-full object-cover" /> : <i data-lucide="user" className="m-auto mt-3 text-slate-700 w-5 h-5"></i>}
                                </div>
                                <div className="flex-1 overflow-hidden text-left">
                                    <h4 className="font-black text-white text-[10px] uppercase truncate tracking-tight leading-none mb-1">{s.nama}</h4>
                                    <p className="text-[7px] font-bold text-emerald-500 uppercase tracking-tighter opacity-80 leading-none">{s.kelas} | Siri {s.siri}</p>
                                </div>
                                <div className="text-right shrink-0">
                                    <p className="text-xs font-black text-emerald-400 leading-none">{s.marks?.total}%</p>
                                    <p className="text-[6px] font-bold text-slate-500 mt-0.5 uppercase tracking-widest opacity-40">Score</p>
                                </div>
                            </motion.div>
                        )) : (
                            <div className="py-20 text-center glass-morphism rounded-[30px] border-dashed border-slate-800 border-2 shadow-inner"><p className="text-slate-700 font-black uppercase text-[8px] tracking-[0.4em] italic leading-tight">Data Tidak Ditemui</p></div>
                        )}
                    </div>
                </div>
            );
        };

        const EvaluationPanel = ({ student, activeTab, setActiveTab, setSelectedStudent, saveMarks, syncing }) => {
            const hp3Wajaran = useMemo(() => {
                const totalRaw = student.marks.hp3_items.reduce((a, b) => a + b, 0);
                return ((totalRaw / 600) * 25).toFixed(2);
            }, [student.marks.hp3_items]);

            const adjustHP8 = (type, amount) => {
                const key = type === 'ind' ? 'hp8_ind' : 'hp8_kum';
                const max = type === 'ind' ? 20 : 30;
                const currentVal = parseFloat(student.marks[key]);
                const newVal = Math.min(max, Math.max(0, currentVal + amount));
                setSelectedStudent(prev => ({ ...prev, marks: { ...prev.marks, [key]: newVal.toString() } }));
            };

            return (
                <motion.div initial={{ y: '100%' }} animate={{ y: 0 }} exit={{ y: '100%' }} transition={{ type: 'spring', damping: 30, stiffness: 250 }} className="fixed inset-0 z-50 bg-[#020617] flex flex-col h-full overflow-hidden">
                    <div className="p-4 bg-slate-900 border-b border-slate-800 flex items-center gap-4 shrink-0 shadow-2xl relative z-10 text-center">
                        <button onClick={() => setSelectedStudent(null)} className="p-2 bg-slate-800 rounded-xl text-slate-400 border border-slate-700 active:scale-90 shrink-0 shadow-inner"><i data-lucide="chevron-left" size={20}></i></button>
                        <div className="w-24 h-24 rounded-[30px] bg-slate-800 overflow-hidden border-4 border-emerald-500/20 shrink-0 shadow-2xl relative ring-4 ring-emerald-500/5 mx-auto">
                            {student.url_gambar ? <img src={student.url_gambar} className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center text-slate-700 bg-slate-950"><i data-lucide="user" size={40}></i></div>}
                        </div>
                        <div className="flex-1 overflow-hidden text-left">
                            <h2 className="text-[13px] font-black text-white uppercase truncate mb-1 tracking-tight leading-none">{student.nama}</h2>
                            <p className="text-[8px] font-bold text-slate-500 truncate mb-2 uppercase opacity-70 leading-none">{student.kelas} | Siri {student.siri}</p>
                            <div className="flex gap-2">
                                <div className="px-2 py-0.5 bg-emerald-500/10 border border-emerald-500/20 rounded-lg shadow-sm"><p className="text-[5px] font-black text-slate-500 uppercase leading-none">IND</p><p className="text-[9px] font-black text-emerald-400 leading-none">{student.marks.hp8_ind}</p></div>
                                <div className="px-2 py-0.5 bg-blue-500/10 border border-blue-500/20 rounded-lg shadow-sm"><p className="text-[5px] font-black text-slate-500 uppercase leading-none">KUM</p><p className="text-[10px] font-black text-blue-400 leading-none">{student.marks.hp8_kum}</p></div>
                            </div>
                        </div>
                    </div>

                    <div className="px-4 py-2 flex gap-2 bg-slate-900 border-b border-slate-800 shrink-0 overflow-x-auto no-scrollbar z-10">
                        {[{id:'amali3',icon:'activity',l:'AMALI 3'},{id:'amali2',icon:'layers',l:'AMALI 2'},{id:'kuiz',icon:'trophy',l:'KUIZ'}].map(t => (
                            <button key={t.id} onClick={() => setActiveTab(t.id)} className={`flex-1 min-w-[80px] py-2.5 rounded-xl flex flex-col items-center gap-1 transition-all ${activeTab === t.id ? 'tab-active' : 'bg-slate-800 text-slate-500 shadow-inner'}`}>
                                <i data-lucide={t.icon} size={14}></i>
                                <span className="text-[8px] font-black tracking-widest uppercase leading-none">{t.l}</span>
                            </button>
                        ))}
                    </div>

                    <div className="flex-1 overflow-y-auto p-4 pb-32 no-scrollbar bg-[#020617] relative z-0">
                        {activeTab === 'amali3' && (
                            <div className="space-y-4 animate-in fade-in duration-300">
                                <div className="p-4 glass-morphism rounded-3xl border-emerald-500/10 space-y-4 shadow-xl">
                                    <div className="flex justify-between items-center"><span className="text-[8px] font-black text-white uppercase tracking-widest flex items-center gap-2"><i data-lucide="user-check" size={12}/> HP8 INDIVIDU (MAX 20)</span><span className="text-xl font-black text-emerald-400 font-mono shadow-inner">{student.marks.hp8_ind}</span></div>
                                    <div className="flex gap-2">
                                        <button onClick={() => adjustHP8('ind', 1)} className="flex-1 py-3 bg-emerald-500 text-slate-950 rounded-xl font-black text-[9px] uppercase shadow-lg active:scale-95 transition-all">+ MERIT</button>
                                        <button onClick={() => adjustHP8('ind', -1)} className="flex-1 py-3 bg-red-500 text-white rounded-xl font-black text-[9px] uppercase shadow-lg active:scale-95 transition-all">- DEMERIT</button>
                                    </div>
                                </div>
                                <div className="p-4 glass-morphism rounded-3xl border-blue-500/10 space-y-4 shadow-xl">
                                    <div className="flex justify-between items-center"><span className="text-[8px] font-black text-white uppercase tracking-widest flex items-center gap-2"><i data-lucide="users" size={12}/> HP8 KUMPULAN (MAX 30)</span><span className="text-xl font-black text-blue-400 font-mono shadow-inner">{student.marks.hp8_kum}</span></div>
                                    <div className="flex gap-2">
                                        <button onClick={() => adjustHP8('kum', 1)} className="flex-1 py-3 bg-emerald-500 text-slate-950 rounded-xl font-black text-[9px] uppercase shadow-lg active:scale-95 transition-all">+ MERIT</button>
                                        <button onClick={() => adjustHP8('kum', -1)} className="flex-1 py-3 bg-red-500 text-white rounded-xl font-black text-[9px] uppercase shadow-lg active:scale-95 transition-all">- DEMERIT</button>
                                    </div>
                                </div>

                                <div className="space-y-2 mt-4 pt-4 border-t border-slate-800">
                                    <div className="flex justify-between items-center mb-3 px-2">
                                        <p className="text-[7px] font-black text-slate-500 uppercase tracking-[0.4em]">AMALI PRAKTIKAL (25%)</p>
                                        <span className="text-[9px] font-black text-emerald-400 font-mono leading-none">{hp3Wajaran}%</span>
                                    </div>
                                    {["Kecergasan", "Pemakanan", "Kembara", "Keyakinan Air", "Rakit / Kayak", "Tali Tinggi"].map((label, idx) => (
                                        <div key={label} className="p-3 glass-morphism rounded-2xl border-slate-800/50 shadow-inner">
                                            <div className="flex justify-between items-center mb-1.5"><span className="text-[8px] font-black text-white uppercase tracking-tight">{idx+1}. {label}</span><span className="text-sm font-black text-emerald-500 font-mono">{student.marks.hp3_items[idx]}%</span></div>
                                            <input type="range" min="0" max="100" value={student.marks.hp3_items[idx]} onChange={e => {
                                                const newM = [...student.marks.hp3_items];
                                                newM[idx] = parseInt(e.target.value);
                                                setSelectedStudent(prev => ({...prev, marks: {...prev.marks, hp3_items: newM}}));
                                            }} className="giant-slider" />
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'amali2' && (
                            <div className="space-y-4 animate-in fade-in duration-300">
                                <div className="grid grid-cols-2 gap-3 text-center">
                                    {[{k:'hp4',l:'HP4 (15)'},{k:'hp5',l:'HP5 (10)'}].map(item => (
                                        <div key={item.k} className="p-6 glass-morphism rounded-3xl border border-slate-800 shadow-2xl">
                                            <label className="text-[8px] font-black text-slate-500 uppercase block mb-3 tracking-widest leading-none">{item.l}</label>
                                            <input type="number" value={student.marks[item.k]} onChange={e => setSelectedStudent(prev => ({...prev, marks: {...prev.marks, [item.k]: e.target.value}}))} className="w-full bg-transparent text-center text-4xl font-black text-white outline-none focus:text-emerald-400 shadow-inner" />
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'kuiz' && (
                            <div className="space-y-4 animate-in fade-in duration-300 px-2">
                                {['kuiz1', 'kuiz2'].map(k => (
                                    <div key={k} className="p-8 glass-morphism rounded-[40px] text-center border-emerald-500/5 shadow-2xl">
                                        <label className="text-[10px] font-black text-slate-500 uppercase tracking-[0.4em] mb-3 block leading-none">{k.toUpperCase()}</label>
                                        <input type="number" value={student.marks[k]} onChange={e => setSelectedStudent(prev => ({...prev, marks: {...prev.marks, [k]: e.target.value}}))} className="w-full bg-transparent text-center text-7xl font-black text-white border-none outline-none focus:text-emerald-400 shadow-inner" />
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    <div className="p-4 bg-slate-900 border-t border-slate-800 fixed bottom-0 w-full z-20 shrink-0 shadow-[0_-15px_40px_rgba(0,0,0,0.7)] backdrop-blur-xl">
                        <button onClick={saveMarks} disabled={syncing} className="w-full py-4 rounded-2xl bg-emerald-500 text-slate-950 font-black text-xs flex items-center justify-center gap-3 shadow-[0_0_30px_rgba(16,185,129,0.3)] active:scale-95 transition-all uppercase tracking-widest leading-none">
                            {syncing ? <div className="w-4 h-4 border-2 border-slate-950 border-t-transparent rounded-full animate-spin"></div> : <i data-lucide="save" size={16}></i>}
                            SIMPAN PEMARKAHAN CLOUD
                        </button>
                    </div>
                </motion.div>
            );
        };

        const StudentPortal = ({ currentUser, onLogout, saveBiodata, syncing }) => {
            const [formData, setFormData] = useState({ siri: currentUser.siri || '', kumpulan: currentUser.kumpulan || '', no_kumpulan: currentUser.no_kumpulan || '', alahan: currentUser.alahan || '', tel_kecemasan: currentUser.tel_kecemasan || '', url_gambar: currentUser.url_gambar || '' });
            const handleChange = (field, val) => setFormData(prev => ({...prev, [field]: val}));

            return (
                <div className="min-h-screen flex items-center justify-center p-2 bg-[#020617] overflow-y-auto no-scrollbar">
                    <motion.div initial={{ scale: 0.95, opacity: 0 }} animate={{ scale: 1, opacity: 1 }} className="w-full max-w-lg glass-morphism rounded-[40px] overflow-hidden shadow-2xl my-4 border-emerald-500/10">
                        <div className="bg-emerald-500 p-6 flex flex-col items-center shadow-lg">
                            <div className="w-20 h-20 bg-slate-950 rounded-[30px] p-1 mb-3 shadow-2xl overflow-hidden border-4 border-slate-950/20">
                                {formData.url_gambar ? <img src={formData.url_gambar} className="w-full h-full object-cover" /> : <div className="p-6 text-emerald-500 flex items-center justify-center"><i data-lucide="user" size={40}></i></div>}
                            </div>
                            <h2 className="text-xl font-black text-slate-950 uppercase text-center leading-none italic tracking-tight">{currentUser?.nama}</h2>
                            <p className="text-[8px] font-black text-slate-900/60 uppercase mt-1 tracking-widest bg-slate-950/10 px-3 py-1 rounded-full">Identiti BIG 2026</p>
                        </div>
                        <div className="p-4 space-y-3">
                            <div className="grid grid-cols-2 gap-2">
                                <div className="space-y-0.5"><label className="text-[7px] font-black text-slate-500 uppercase px-1">Siri BIG</label><input value={formData.siri} onChange={e => handleChange('siri', e.target.value)} className="form-input shadow-inner" placeholder="Cth: 2/2026" /></div>
                                <div className="space-y-0.5"><label className="text-[7px] font-black text-slate-500 uppercase px-1">Kumpulan</label><select value={formData.kumpulan.toUpperCase()} onChange={e => handleChange('kumpulan', e.target.value)} className="form-input appearance-none shadow-inner"><option value="">Pilih</option>{KUMPULAN_LIST.map(k => <option key={k} value={k}>{k}</option>)}</select></div>
                            </div>
                            <div className="grid grid-cols-2 gap-2">
                                <div className="space-y-0.5"><label className="text-[7px] font-black text-slate-500 uppercase px-1">No. Ahli</label><input type="number" value={formData.no_kumpulan} onChange={e => handleChange('no_kumpulan', e.target.value)} className="form-input shadow-inner" /></div>
                                <div className="space-y-0.5"><label className="text-[7px] font-black text-slate-500 uppercase px-1">Unit/Kelas</label><input value={currentUser.kelas} disabled className="form-input opacity-50 bg-slate-900 cursor-not-allowed" /></div>
                            </div>
                            <div className="grid grid-cols-2 gap-2">
                                <div className="space-y-0.5"><label className="text-[7px] font-black text-slate-500 uppercase px-1">Alahan</label><input value={formData.alahan} onChange={e => handleChange('alahan', e.target.value)} className="form-input shadow-inner text-[9px]" placeholder="Nyatakan..." /></div>
                                <div className="space-y-0.5"><label className="text-[7px] font-black text-slate-500 uppercase px-1">Tel Waris</label><input value={formData.tel_kecemasan} onChange={e => handleChange('tel_kecemasan', e.target.value)} className="form-input shadow-inner text-[9px]" placeholder="012-..." /></div>
                            </div>
                            <div className="space-y-0.5"><label className="text-[7px] font-black text-slate-500 uppercase px-1">Link G-Drive Gambar</label><input value={formData.url_gambar} onChange={e => handleChange('url_gambar', e.target.value)} className="form-input text-[8px] shadow-inner font-mono" placeholder="https://..." /></div>
                            
                            <div className="pt-2 space-y-2">
                                <button onClick={() => saveBiodata(formData)} disabled={syncing} className="w-full py-3 bg-emerald-500 text-slate-950 font-black rounded-xl text-[10px] uppercase shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2">
                                    {syncing ? <div className="w-3 h-3 border-2 border-slate-950 border-t-transparent rounded-full animate-spin"></div> : <i data-lucide="save" size={14}></i>} KEMASKINI BIODATA CLOUD
                                </button>
                                <button onClick={onLogout} className="w-full py-2 text-[8px] font-black uppercase text-slate-500 tracking-[0.4em] border border-slate-800/50 rounded-xl hover:bg-red-500/5 transition-colors">TUTUP AKSES</button>
                            </div>
                        </div>
                    </motion.div>
                </div>
            );
        };

        // --- MAIN APP ---

        function App() {
            const [view, setView] = useState('login');
            const [role, setRole] = useState('staff'); 
            const [currentUser, setCurrentUser] = useState(null);
            const [students, setStudents] = useState([]);
            const [lecturers, setLecturers] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedStudent, setSelectedStudent] = useState(null);
            const [activeEvalTab, setActiveEvalTab] = useState('amali3');
            const [syncing, setSyncing] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');

            const fetchData = useCallback(async () => {
                setSyncing(true);
                try {
                    const [resS, resL, resM] = await Promise.all([
                        fetch(`${CSV_STUDENTS_URL}&t=${Date.now()}`).then(r => r.text()),
                        fetch(`${CSV_LECTURERS_URL}&t=${Date.now()}`).then(r => r.text()),
                        fetch(`${CSV_MARKS_URL}&t=${Date.now()}`).then(r => r.text())
                    ]);
                    const pL = parseCSV(resL).filter(l => l.email);
                    const pM = parseCSV(resM);
                    const pS = parseCSV(resS).map(s => {
                        const mD = pM.find(m => m.no_kp?.toString().trim() === s.no_kp?.toString().trim()) || {};
                        return {
                            ...s,
                            assigned_lecturer: mD.nama_pensyarah || '',
                            marks: {
                                kuiz1: mD.kuiz1 || '0', kuiz2: mD.kuiz2 || '0',
                                hp3_items: [70, 70, 70, 70, 70, 70],
                                hp4: mD['hp4_(10%)'] || '10.5', hp5: mD['hp5_(10%)'] || '7',    
                                hp8_ind: mD['hp8_ind_(15%)'] || '14', hp8_kum: mD['hp8_kum_(30%)'] || '21',
                                total: mD['jumlah_(100%)'] || '0'
                            }
                        };
                    }).filter(s => s.nama);
                    setStudents(pS);
                    setLecturers(pL);
                } catch (e) { console.error("Sync Error:", e); }
                finally { setSyncing(false); setLoading(false); }
            }, []);

            useEffect(() => { fetchData(); }, [fetchData]);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

            const handleLogin = (e) => {
                e.preventDefault();
                const email = e.target.email?.value.trim().toLowerCase();
                const pass = e.target.password?.value.trim();
                const ic = e.target.ic?.value.trim();

                if (role === 'student') {
                    const found = students.find(s => s.no_kp === ic);
                    if (found) { setCurrentUser(found); setView('student_portal'); }
                    else alert("ID Pelajar tidak dikesan.");
                } else {
                    // Cek Admin (Ketua Unit)
                    if (email === ADMIN_EMAIL && (pass === '123456' || pass === '30621')) {
                        setCurrentUser({ nama_pensyarah: 'Haniff Faizal', email: ADMIN_EMAIL });
                        setRole('admin');
                        setView('admin_dashboard');
                    } else {
                        const lect = lecturers.find(l => l.email.toLowerCase() === email && l.password.toString() === pass);
                        if (lect) { 
                            setCurrentUser(lect); 
                            setRole('staff');
                            setView('lecturer_dashboard'); 
                        }
                        else alert("Akses Ditolak. Sila semak emel/kata laluan.");
                    }
                }
            };

            const onLogout = () => { setView('login'); setCurrentUser(null); setSelectedStudent(null); setRole('staff'); };

            const saveMarks = async () => {
                if (!selectedStudent) return;
                setSyncing(true);
                const hp3_w = (selectedStudent.marks.hp3_items.reduce((a, b) => a + b, 0) / 600) * 25;
                try {
                    const payload = {
                        target: 'markah',
                        no_kp: selectedStudent.no_kp,
                        data: {
                            'Kuiz1': selectedStudent.marks.kuiz1,
                            'Kuiz2': selectedStudent.marks.kuiz2,
                            'HP4 (10%)': selectedStudent.marks.hp4,
                            'HP5 (10%)': selectedStudent.marks.hp5,
                            'HP8 Ind (15%)': selectedStudent.marks.hp8_ind,
                            'HP8 Kum (30%)': selectedStudent.marks.hp8_kum,
                            'HP3 (25%)': hp3_w.toFixed(2)
                        }
                    };
                    
                    await fetch(GOOGLE_SHEET_API_URL, {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });
                    
                    alert("Berjaya Disimpan ke Google Sheets!");
                    setSelectedStudent(null);
                    fetchData();
                } catch (e) { 
                    alert("Ralat Cloud. Pastikan Web App Script anda aktif."); 
                } finally { setSyncing(false); }
            };

            const saveBiodata = async (formData) => {
                setSyncing(true);
                try {
                    const payload = {
                        target: 'biodata',
                        no_kp: currentUser.no_kp,
                        data: formData
                    };
                    await fetch(GOOGLE_SHEET_API_URL, { method: 'POST', body: JSON.stringify(payload) });
                    alert("Profil Dikemaskini!");
                    fetchData();
                } catch (e) { alert("Ralat Kemaskini."); }
                finally { setSyncing(false); }
            };

            const handleQuickScan = (student) => {
                setSelectedStudent(student);
                setActiveEvalTab('amali3');
                if (!currentUser) {
                    setCurrentUser({ nama_pensyarah: student.assigned_lecturer || 'Pemerhati Tag' });
                    setRole('staff');
                }
                setView('lecturer_dashboard'); 
            };

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center gap-6 bg-[#020617]">
                    <div className="w-10 h-10 border-4 border-emerald-500/10 border-t-emerald-500 rounded-full animate-spin shadow-2xl"></div>
                    <p className="text-emerald-500 font-bold tracking-[0.4em] text-[8px] animate-pulse">MEMUAT PANGKALAN DATA...</p>
                </div>
            );

            return (
                <div className="selection:bg-emerald-500/30 overflow-hidden">
                    {view === 'login' && <LoginView role={role} setRole={setRole} handleLogin={handleLogin} students={students} onQuickScan={handleQuickScan} />}
                    {view === 'admin_dashboard' && <AdminDashboard students={students} onLogout={onLogout} onSelectStudent={(s) => { setSelectedStudent(s); setActiveEvalTab('amali3'); }} />}
                    {view === 'lecturer_dashboard' && (
                        <LecturerDashboard 
                            currentUser={currentUser} students={students} 
                            searchQuery={searchQuery} setSearchQuery={setSearchQuery} 
                            setSelectedStudent={setSelectedStudent} setActiveEvalTab={setActiveEvalTab} 
                            onLogout={onLogout}
                            isAdmin={role === 'admin'}
                        />
                    )}
                    {view === 'student_portal' && <StudentPortal currentUser={currentUser} onLogout={onLogout} saveBiodata={saveBiodata} syncing={syncing} />}
                    
                    <AnimatePresence>
                        {selectedStudent && (
                            <EvaluationPanel 
                                student={selectedStudent} activeTab={activeEvalTab} setActiveTab={setActiveEvalTab} 
                                setSelectedStudent={setSelectedStudent} saveMarks={saveMarks} syncing={syncing} 
                            />
                        )}
                    </AnimatePresence>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
